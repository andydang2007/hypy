
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop, Smile, Learn, Enjoy!</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: 'Comic Sans MS', 'Nunito', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        body { margin: 0; padding: 0; overflow: hidden; background: linear-gradient(to bottom, #87CEEB, #E0F6FF); height: 100vh; color: #333; }
        
        #hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px 30px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; font-size: 20px; font-weight: 900; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat span { font-size: 14px; color: #64748b; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: #f43f5e; font-size: 24px; }
        .time-warning { color: red !important; animation: pulse 1s infinite; }

        #game-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 10; }

        .balloon-wrap { position: absolute; bottom: -180px; display: flex; justify-content: center; align-items: center; }
        .balloon { position: relative; border-radius: 50%; cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center center; box-shadow: inset -12px -12px 24px rgba(0,0,0,0.15), inset 6px 6px 18px rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; }
        .balloon::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid inherit; filter: brightness(0.85); }
        .balloon::before { content: ''; position: absolute; bottom: -58px; left: 50%; transform: translateX(-50%); width: 2.5px; height: 50px; background: rgba(255, 255, 255, 0.7); z-index: -1; border-radius: 2px; }

        .golden { background: radial-gradient(circle at 30% 30%, #fff 0%, #ffd700 50%, #b8860b 100%) !important; border-bottom-color: #ffd700 !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), inset -12px -12px 24px rgba(184,134,11,0.5), inset 6px 6px 18px rgba(255,255,255,0.8) !important; animation: glow 1s alternate infinite; }

        .confetti { position: absolute; width: 8px; height: 16px; opacity: 1; border-radius: 3px; z-index: 50;}
        .cap { position: absolute; font-size: 40px; z-index: 60; } 
        .float-text { position: absolute; color: #FFD700; font-weight: 900; font-size: 36px; text-shadow: 2px 2px 0 #FF4500, -1px -1px 0 #FFF; pointer-events: none; z-index: 70; animation: floatUpText 0.8s forwards; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 200; display: flex; justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px 50px; border-radius: 35px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); transform: scale(0.8); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; max-width: 90%; }
        .modal h1 { margin-top: 0; font-size: 34px; color: #1e293b; margin-bottom: 15px; }
        .modal p { font-size: 22px; color: #475569; font-weight: 800; line-height: 1.5; margin-bottom: 25px; }
        .sle { color: #f43f5e; font-size: 1.3em; font-weight: 900; text-shadow: 2px 2px 0 #fecdd3; }

        .btn { padding: 16px 45px; font-size: 24px; font-weight: 900; color: white; background: #10b981; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 8px 0 #059669; transition: 0.15s; outline: none; margin-top: 10px; }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }

        @keyframes floatUpText { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 50% { transform: translateY(-45px) scale(1.2); opacity: 1; } 100% { transform: translateY(-90px) scale(1); opacity: 0; } }
        @keyframes popIn { to { transform: scale(1); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes glow { from { filter: brightness(1); } to { filter: brightness(1.3); } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat"><span>Level</span><div id="ui-level" class="highlight">P1</div></div>
        <div class="stat"><span>Time</span><div id="ui-time" class="highlight">30s</div></div>
        <div class="stat"><span>Coins</span><div class="highlight"><span id="ui-coins">0</span> / <span id="ui-target">1000</span></div></div>
    </div>

    <div id="game-area"></div>

    <div id="overlay">
        <div class="modal" id="modal-box">
            <h1 id="modal-title"><span class="sle">P</span>op, <span class="sle">S</span>mile, <span class="sle">L</span>earn, <span class="sle">E</span>njoy!</h1>
            <p id="modal-desc">Tap the balloons to pop them.</p>
            <button class="btn" id="modal-btn" onclick="startOrNextLevel()">Start Game</button>
        </div>
    </div>

<script>
    // 🌟 动态 GPS 寻路逻辑：不写死跳回的页面
    const urlParams = new URLSearchParams(window.location.search);
    const returnUrlParam = urlParams.get('returnUrl');
    let returnURL = "../index.html"; // 终极防走丢地址 (回到主页)

    if (returnUrlParam) {
        if (returnUrlParam.startsWith('http')) {
            returnURL = decodeURIComponent(returnUrlParam);
        } else if (document.referrer) {
            try {
                let ref = new URL(document.referrer);
                let paths = ref.pathname.split('/');
                paths[paths.length - 1] = decodeURIComponent(returnUrlParam);
                returnURL = ref.origin + paths.join('/');
            } catch(e) {
                returnURL = document.referrer;
            }
        } else {
            returnURL = "../" + decodeURIComponent(returnUrlParam);
        }
    } else if (document.referrer) {
        returnURL = document.referrer; 
    }

    // ----------------------------------------------------------------------

    const LEVELS = ['P1', 'P2', 'P3', 'P4', 'P5', 'P6', 'PSLE'];
    const TARGETS = [1000, 1500, 2000, 2500, 3000, 3500, 5000];
    let state = { levelIndex: 0, coins: 0, time: 30, isPlaying: false };
    let timerId, spawnId;
    const gameArea = document.getElementById('game-area');
    const colors = ['#f43f5e', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef'];

    let audioCtx = null;
    let isPlayingBgm = false;
    let nextNoteTime = 0;
    let noteIndex = 0;
    let bgmTimeout = null;
    const melody = [ 261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 349.23, 440.00, 523.25, 440.00, 349.23, 329.63 ];
    const cheerAudio = new Audio("https://actions.google.com/sounds/v1/foley/cheer_short.ogg");
    
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBGMNote() {
        if (!isPlayingBgm || !audioCtx) return;
        const noteLength = 0.15; 
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            let freq = melody[noteIndex % melody.length];
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.04, nextNoteTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLength - 0.02);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(nextNoteTime); osc.stop(nextNoteTime + noteLength);
            nextNoteTime += noteLength; noteIndex++;
        }
        bgmTimeout = setTimeout(playBGMNote, 25);
    }

    function startBGM() { if (!audioCtx || isPlayingBgm) return; isPlayingBgm = true; nextNoteTime = audioCtx.currentTime + 0.1; playBGMNote(); }
    function stopBGM() { isPlayingBgm = false; clearTimeout(bgmTimeout); }

    function playTapSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function playBurstSound(isGolden) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.type = 'square'; 
        let startFreq = isGolden ? 600 : 300;
        osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function updateHUD() {
        document.getElementById('ui-level').innerText = LEVELS[state.levelIndex];
        document.getElementById('ui-time').innerText = state.time + 's';
        document.getElementById('ui-coins').innerText = state.coins;
        document.getElementById('ui-target').innerText = TARGETS[state.levelIndex];
        if (state.time <= 5) document.getElementById('ui-time').classList.add('time-warning');
        else document.getElementById('ui-time').classList.remove('time-warning');
    }

    function startOrNextLevel() {
        initAudio(); startBGM(); 
        document.getElementById('overlay').style.display = 'none';
        state.coins = 0; state.time = 30; state.isPlaying = true;
        gameArea.innerHTML = ''; updateHUD();
        let currentSpawnRate = Math.max(120, 360 - (state.levelIndex * 40));
        timerId = setInterval(gameTick, 1000);
        spawnId = setInterval(spawnBalloon, currentSpawnRate);
    }

    function gameTick() {
        if (!state.isPlaying) return;
        state.time--; updateHUD();
        if (state.time <= 0) endGame();
        else if (state.coins >= TARGETS[state.levelIndex]) levelUp();
    }

    function endGame() {
        state.isPlaying = false; stopBGM(); clearInterval(timerId); clearInterval(spawnId);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('modal-title').innerText = '😢 Game Over';
        
        // 🌟 游戏失败后，显示自动返回信息
        document.getElementById('modal-desc').innerHTML = `Time's up!<br>You reached <strong>${LEVELS[state.levelIndex]}</strong><br>Earned ${state.coins} coins.<br><br><span style="font-size:16px;">正在返回...</span>`;
        document.getElementById('modal-btn').style.display = 'none';
        
        // 🌟 执行动态跳转
        setTimeout(() => {
            window.location.replace(returnURL);
        }, 3500);
    }

    function levelUp() {
        state.isPlaying = false; stopBGM(); clearInterval(timerId); clearInterval(spawnId);
        cheerAudio.currentTime = 0; cheerAudio.play().catch(e => console.log(e)); 
        createConfetti(window.innerWidth * 0.5, window.innerHeight * 0.5, 80);

        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
            let btn = document.getElementById('modal-btn');
            let titleEl = document.getElementById('modal-title');
            let descEl = document.getElementById('modal-desc');

            if (state.levelIndex < 5) { 
                titleEl.innerHTML = `You have finished ${LEVELS[state.levelIndex]}`;
                titleEl.style.color = '#22c55e';
                descEl.innerHTML = ``; 
                btn.style.display = 'inline-block';
                btn.innerText = `Enter ${LEVELS[state.levelIndex + 1]}`;
                btn.style.background = '#3b82f6';
                btn.onclick = () => { state.levelIndex++; startOrNextLevel(); };
            } else if (state.levelIndex === 5) { 
                titleEl.innerHTML = `You have finished P6`;
                titleEl.style.color = '#f59e0b';
                descEl.innerHTML = ``; 
                btn.style.display = 'inline-block';
                btn.innerText = `Take PSLE`;
                btn.style.background = '#f43f5e';
                btn.onclick = () => { state.levelIndex++; startOrNextLevel(); };
            } else { 
                titleEl.innerHTML = `Congratulations!<br><span style="font-size:26px; color:#475569; display:block; margin-top:15px;">You passed PSLE and graduated!</span>`;
                titleEl.style.color = '#eab308'; titleEl.style.fontSize = '42px';
                
                // 🌟 通关后，显示自动返回信息
                descEl.innerHTML = '<span style="font-size:16px;">正在返回...</span>'; 
                btn.style.display = 'none';
                
                for(let i=0; i<8; i++) {
                    setTimeout(() => { createConfetti(Math.random() * window.innerWidth, window.innerHeight/2, 40); createCaps(Math.random() * window.innerWidth, window.innerHeight * 0.8, 3); }, i*350);
                }
                
                // 🌟 执行动态跳转
                setTimeout(() => {
                    window.location.replace(returnURL);
                }, 4500);
            }
        }, 800); 
    }

    function spawnBalloon() {
        if (!state.isPlaying) return;
        const wrap = document.createElement('div'); wrap.className = 'balloon-wrap';
        const balloon = document.createElement('div'); balloon.className = 'balloon';
        wrap.appendChild(balloon);
        
        const isBig = Math.random() > 0.5;
        const sizeBase = isBig ? (Math.random() * 20 + 100) : (Math.random() * 20 + 60); 
        const targetClicks = isBig ? (Math.floor(Math.random() * 2) + 2) : (Math.floor(Math.random() * 2) + 5); 
        const isGolden = Math.random() < 0.1;
        if (isGolden) { balloon.classList.add('golden'); } 
        else {
            const color = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.background = `radial-gradient(circle at 30% 30%, #ffffff 0%, ${color} 60%, #333333 100%)`;
            balloon.style.borderBottomColor = color; 
        }

        const leftPos = Math.random() * 80 + 10; 
        let currentClicks = 0; let currentScale = 1;
        balloon.style.width = sizeBase + 'px'; balloon.style.height = sizeBase + 'px'; 
        wrap.style.left = leftPos + '%';
        const floatDuration = Math.max(2000, (Math.random() * 2000 + 2500) - (state.levelIndex * 150)); 
        
        const animation = wrap.animate([
            { transform: `translateY(0)` }, { transform: `translateY(-${window.innerHeight + 300}px)` }
        ], { duration: floatDuration, easing: 'linear', fill: 'forwards' });

        animation.onfinish = () => { if (wrap.parentNode) wrap.parentNode.removeChild(wrap); };

        balloon.onmousedown = (e) => {
            if (!state.isPlaying) return;
            currentClicks++;
            if (currentClicks >= targetClicks) { 
                playBurstSound(isGolden); 
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                popBalloon(wrap, clientX, clientY, isGolden); 
            } 
            else { 
                playTapSound(); 
                currentScale += 0.20; 
                balloon.style.transform = `scale(${currentScale})`; 
            }
        };
        balloon.ontouchstart = (e) => { balloon.onmousedown(e); };

        gameArea.appendChild(wrap);
    }

    function popBalloon(wrap, x, y, isGolden) {
        if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
        const earned = isGolden ? 500 : 100; state.coins += earned; updateHUD();
        const text = document.createElement('div'); text.className = 'float-text';
        text.innerText = '+' + earned;
        if (isGolden) { text.style.fontSize = '48px'; text.style.textShadow = '0 0 10px #ffd700'; }
        
        if(x && y) {
            text.style.left = (x - 30) + 'px'; text.style.top = (y - 30) + 'px';
        } else {
            text.style.left = '50%'; text.style.top = '50%';
        }
        
        gameArea.appendChild(text);
        setTimeout(() => { if (text.parentNode) text.parentNode.removeChild(text); }, 800);
        if(x && y) createConfetti(x, y, isGolden ? 30 : 15);
        if (state.coins >= TARGETS[state.levelIndex] && state.time > 0) levelUp();
    }

    function createConfetti(x, y, amount) {
        for (let i = 0; i < amount; i++) {
            const confetti = document.createElement('div'); confetti.className = 'confetti';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = x + 'px'; confetti.style.top = y + 'px';
            gameArea.appendChild(confetti);
            const angle = Math.random() * Math.PI * 2;
            const tx = Math.cos(angle) * (Math.random() * 100 + 50);
            const ty = Math.sin(angle) * (Math.random() * 100 + 50) + 150;
            confetti.animate([ { transform: 'translate(0, 0)', opacity: 1 }, { transform: `translate(${tx}px, ${ty}px)`, opacity: 0 } ], { duration: 1000 }).onfinish = () => confetti.remove();
        }
    }

    function createCaps(x, y, amount) {
        for (let i = 0; i < amount; i++) {
            const cap = document.createElement('div'); cap.className = 'cap'; cap.innerText = '🎓';
            cap.style.left = x + 'px'; cap.style.top = y + 'px';
            gameArea.appendChild(cap);
            cap.animate([ { transform: 'translate(0, 0) scale(1)', opacity: 1 }, { transform: `translate(${(Math.random()-0.5)*200}px, 300px) scale(0)`, opacity: 0 } ], { duration: 1500 }).onfinish = () => cap.remove();
        }
    }
</script>

</body>
</html>
