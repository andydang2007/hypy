<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>神秘奖励抽取中...</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:0;

    background:
        radial-gradient(circle at top left, rgba(56,189,248,.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,.15), transparent 30%),
        #0f172a;

    color:white;

    font-family:'Nunito','Microsoft YaHei',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* 登录卡片 */

.auth-card{

    width:min(92%,420px);

    background:rgba(15,23,42,.92);

    border:1px solid rgba(255,255,255,.08);

    border-radius:32px;

    padding:40px 30px;

    text-align:center;

    box-shadow:
        0 20px 60px rgba(0,0,0,.45);

    backdrop-filter:blur(12px);
}

.lock-icon{

    font-size:72px;

    margin-bottom:20px;

    filter:drop-shadow(0 0 15px rgba(56,189,248,.45));
}

.auth-title{

    font-size:30px;

    font-weight:900;

    margin-bottom:10px;

    color:#38bdf8;
}

.auth-subtitle{

    color:#94a3b8;

    line-height:1.6;

    margin-bottom:28px;

    font-size:15px;
}

.input-box{

    width:100%;

    height:62px;

    border:none;

    outline:none;

    border-radius:20px;

    background:#1e293b;

    color:white;

    text-align:center;

    font-size:30px;

    font-weight:900;

    letter-spacing:8px;

    margin-bottom:20px;
}

.input-box::placeholder{
    color:#64748b;
}

.submit-btn{

    width:100%;

    height:58px;

    border:none;

    border-radius:20px;

    background:linear-gradient(90deg,#38bdf8,#818cf8);

    color:white;

    font-size:18px;

    font-weight:900;

    cursor:pointer;

    transition:.2s;
}

.submit-btn:active{
    transform:scale(.97);
}

.error{

    margin-top:18px;

    color:#f87171;

    font-size:14px;

    min-height:20px;
}

/* 抽奖动画页 */

.loading-screen{

    display:none;

    flex-direction:column;

    align-items:center;
}

.box-container{

    position:relative;

    display:flex;
    flex-direction:column;
    align-items:center;

    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-15px); }
}

#mystery-icon{

    font-size:100px;

    filter:drop-shadow(0 10px 20px rgba(56,189,248,.5));

    margin-bottom:20px;

    transition:all .1s;
}

.title{

    font-size:28px;

    font-weight:900;

    color:#38bdf8;

    text-shadow:0 0 15px rgba(56,189,248,.5);

    margin-bottom:10px;

    letter-spacing:2px;

    text-align:center;
}

.subtitle{

    font-size:16px;

    color:#94a3b8;

    font-weight:800;
}

.loading-bar-container{

    width:220px;

    height:6px;

    background:#334155;

    border-radius:10px;

    margin-top:30px;

    overflow:hidden;
}

.loading-bar{

    height:100%;

    width:0%;

    background:#38bdf8;

    border-radius:10px;

    box-shadow:0 0 10px #38bdf8;

    animation:load 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes load{
    0%{ width:0%; }
    100%{ width:100%; }
}

</style>
</head>

<body>

<!-- 口令验证 -->
<div class="auth-card" id="authCard">

    <div class="lock-icon">🔐</div>

    <div class="auth-title">
        输入当天口令
    </div>

    <div class="auth-subtitle">
        请输入今天的动态口令后进入神秘奖励游戏
    </div>

    <input
        type="password"
        maxlength="4"
        class="input-box"
        id="passwordInput"
        placeholder="••••"
        inputmode="numeric"
    >

    <button class="submit-btn" id="submitBtn">
        进入游戏
    </button>

    <div class="error" id="errorText"></div>

</div>


<!-- 抽奖动画 -->
<div class="loading-screen" id="loadingScreen">

    <div class="box-container">

        <div id="mystery-icon">🎁</div>

        <div class="title">
            正在为你抽取神秘奖励
        </div>

        <div class="subtitle">
            Please wait...
        </div>

        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>

    </div>

</div>


<script>

/* =========================
   动态口令逻辑
========================= */

/*
规则：

日期：
ddmmyyyy

例如：
20/05/2026
=> 20052026

星期三：
从第3位开始取4位

=> 5202
*/

function generatePassword(){

    const today = new Date();

    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();

    const dateStr = `${dd}${mm}${yyyy}`;

    let day = today.getDay();

    // 周日=0
    // 改成7

    if(day === 0){
        day = 7;
    }

    const startIndex = day - 1;

    return dateStr.substr(startIndex,4);
}

const correctPassword = generatePassword();


/* =========================
   验证逻辑
========================= */

const authCard = document.getElementById("authCard");
const loadingScreen = document.getElementById("loadingScreen");

const passwordInput = document.getElementById("passwordInput");
const submitBtn = document.getElementById("submitBtn");
const errorText = document.getElementById("errorText");

submitBtn.addEventListener("click",verifyPassword);

passwordInput.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){
        verifyPassword();
    }

});

function verifyPassword(){

    const input = passwordInput.value.trim();

    if(input === correctPassword){

        startLottery();

    }else{

        errorText.innerText = "口令错误，请重新输入";

        passwordInput.value = "";

        passwordInput.focus();
    }
}


/* =========================
   抽奖逻辑
========================= */

function startLottery(){

    authCard.style.display = "none";

    loadingScreen.style.display = "flex";

    // 接收参数
    const urlParams = new URLSearchParams(window.location.search);

    const ticket = urlParams.get('ticket');
    const returnUrl = urlParams.get('returnUrl');

    // 50/50 游戏池
    const GAMES = [
        'catcher.html',
        'popballoons.html'
    ];

    // 随机抽取
    const chosenGame = GAMES[Math.floor(Math.random() * GAMES.length)];

    // 拼接参数
    let targetUrl = "./" + chosenGame;

    let params = [];

    if(ticket){
        params.push('ticket=' + ticket);
    }

    if(returnUrl){
        params.push('returnUrl=' + encodeURIComponent(returnUrl));
    }

    if(params.length > 0){
        targetUrl += '?' + params.join('&');
    }

    // 动画
    const emojis = ['🎁','🎲','🛸','🎈','🎮','🦄','🐼','💎'];

    let count = 0;

    const interval = setInterval(()=>{

        document.getElementById('mystery-icon').innerText =
            emojis[count % emojis.length];

        count++;

    },150);


    // 2.5秒后跳转
    setTimeout(()=>{

        clearInterval(interval);

        if(chosenGame === 'popballoons.html'){

            document.getElementById('mystery-icon').innerText = '🎈';

        }else{

            document.getElementById('mystery-icon').innerText = '🛸';
        }

        document.querySelector('.title').innerText = '抽取成功！';

        document.querySelector('.title').style.color = '#39ff14';

        document.querySelector('.loading-bar').style.background = '#39ff14';

        document.querySelector('.loading-bar').style.boxShadow =
            '0 0 10px #39ff14';


        setTimeout(()=>{

            window.location.replace(targetUrl);

        },500);

    },2500);

}

</script>

</body>
</html>
