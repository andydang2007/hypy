<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinyin Shooter: Laser Expedition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent-glow: #00f0ff; 
            --correct-color: #39ff14; 
            --wrong-color: #ff003c;   
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; color: #fff; 
            font-family: 'Microsoft YaHei', sans-serif;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%), 
                radial-gradient(circle at 85% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        .sci-fi-text { font-family: 'Orbitron', sans-serif; }

        header {
            display: flex; justify-content: flex-end; align-items: center;
            padding: 10px 20px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(5px);
            border-bottom: 2px solid rgba(0, 240, 255, 0.2); z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stat-box { display: flex; flex-direction: column; align-items: flex-end; min-width: 80px; }
        .stat-label { font-size: 12px; color: var(--accent-glow); font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }

        /* ⚔️ 战斗区域 */
        #combat-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; }
        #laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 🚀 飞船 (左侧横向) */
        #spaceship-container { position: absolute; left: 30px; top: 50%; transform: translateY(-50%) rotate(90deg); z-index: 10; }
        .spaceship { position: relative; width: 80px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .wing { position: absolute; width: 30px; height: 15px; background: rgba(15, 23, 42, 0.9); top: 18px; border-bottom: 2px solid var(--accent-glow); }
        .wing.left { left: 0; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); }
        .wing.right { right: 0; clip-path: polygon(0 0, 80% 0, 100% 100%, 0 100%); }
        
        .ship-core {
            width: 50px; height: 50px; background: #050505; border: 3px solid var(--accent-glow); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 12; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6), inset 0 0 15px rgba(0, 240, 255, 0.4); position: relative;
        }
        
        .hud-text { display: inline-block; transform: rotate(-90deg); font-size: 22px; font-weight: 900; color: #fff; font-family: sans-serif;}
        
        .ship-core.needs-fix { border-color: var(--wrong-color); box-shadow: 0 0 30px var(--wrong-color), inset 0 0 15px var(--wrong-color); animation: pulseRed 0.8s infinite alternate; }
        @keyframes pulseRed { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* 👇 脱帽手指提示 */
        #finger-hint {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%) rotate(-90deg);
            font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
            animation: pointDown 0.6s infinite alternate cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: none; z-index: 20; pointer-events: none;
        }
        @keyframes pointDown { from { top: -60px; } to { top: -40px; } }

        /* 👾 怪物 */
        #target-mover { position: absolute; top: 50%; right: -100px; transform: translateY(-50%); z-index: 8; }
        .enemy-target {
            width: 45px; height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.5);
            transform: rotate(45deg); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.1); backdrop-filter: blur(4px);
        }
        .enemy-text { transform: rotate(-45deg); font-size: 24px; font-weight: 900; color: #fff; }

        /* 🎛️ 拟物化重金属仪表盘 */
        .dashboard {
            height: 22vh; min-height: 180px; 
            background: linear-gradient(to bottom, #d1d5db, #9ca3af); 
            border-top: 6px solid #f3f4f6;
            /* 🔥 拉宽间距：使用 space-between 配合 padding 把元件彻底散开 */
            display: flex; justify-content: center; align-items: center; gap: 5vw; border-radius: 30px 30px 0 0;
            box-shadow: inset 0 5px 15px rgba(255,255,255,0.7), 0 -15px 40px rgba(0,0,0,0.8);
            padding: 0 5vw;
        }

        .dial-container { position: relative; width: 18vw; max-width: 140px; aspect-ratio: 1; }
        
        .dial-wrapper { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: #cbd5e1;
            border: 4px solid #64748b; position: relative; display: flex; justify-content: center; align-items: center; cursor: grab; 
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.5); 
            overflow: hidden;
        }

        /* 梯形格子的内圈轨道线 */
        .dial-track {
            position: absolute; top: 22%; left: 22%; right: 22%; bottom: 22%;
            border-radius: 50%; border: 2px solid rgba(100, 116, 139, 0.5);
            pointer-events: none; z-index: 2;
        }

        .dial-wheel { width: 100%; height: 100%; border-radius: 50%; position: absolute; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dial-wheel.dragging { transition: none !important; }
        
        /* 放射状分隔线 (通过 JS 动态生成) */
        .dial-spoke {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            background: rgba(100, 116, 139, 0.6); transform-origin: 0% 50%; z-index: 1;
        }

        .dial-item { 
            position: absolute; top: 50%; left: 50%; width: 70px; height: 30px; 
            margin-top: -15px; margin-left: -35px; display: flex; justify-content: center; align-items: center; 
            font-size: 16px; font-weight: bold; color: #64748b; white-space: nowrap;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8); z-index: 3;
            transition: 0.1s;
        }
        /* 选中态：字变大变深色 */
        .dial-item.active { font-size: 26px; font-weight: 900; color: #0f172a; text-shadow: none; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));}
        
        .dial-knob { 
            position: absolute; width: 44%; height: 44%; 
            background: radial-gradient(circle at 30% 30%, #ffffff, #94a3b8);
            border-radius: 50%; border: 2px solid #475569; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.2); 
            pointer-events: none; z-index: 5; 
        }
        
        /* 🔥 拉开指示箭头的距离，防止遮挡格子 */
        .dial-arrow { position: absolute; right: -38px; top: 50%; transform: translateY(-50%); font-size: 26px; color: #334155; z-index: 10; pointer-events: none; filter: drop-shadow(0 2px 2px #fff); }

        /* 🔥 FIRE 按钮与旋钮大幅拉开距离 */
        .action-container { display: flex; justify-content: center; align-items: center; margin-left: 3vw;}
        #btn-fire-action {
            width: 22vw; max-width: 130px; aspect-ratio: 1; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b91c1c);
            border: 6px solid #450a0a; color: white; font-size: 22px; font-weight: 900; 
            cursor: pointer; transition: 0.1s; letter-spacing: 2px;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 10px 0 #7f1d1d, 0 15px 25px rgba(0,0,0,0.6);
            text-shadow: -1px -1px 0 rgba(0,0,0,0.4);
        }
        #btn-fire-action:active { 
            transform: translateY(8px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 2px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.6); background: radial-gradient(circle at 30% 30%, #cc0000, #7f1d1d);
        }

        /* --- 🎮 Loading 与 启动页面 --- */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .game-title { display: flex; flex-direction: column; align-items: center; gap: 15px; font-size: 36px; color: #fff; margin-bottom: 50px; text-shadow: 0 0 20px var(--accent-glow); text-align: center; letter-spacing: 4px; }
        .title-line { display: flex; gap: 20px; }
        .psle-cap { color: #fbbf24; font-size: 64px; text-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }

        #loading-ui { color: var(--accent-glow); font-size: 20px; letter-spacing: 3px; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }

        .start-btn { 
            padding: 18px 50px; border: 2px solid var(--accent-glow); background: rgba(0, 240, 255, 0.05); color: var(--accent-glow); 
            font-size: 26px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.2);
            letter-spacing: 3px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: all 0.2s; display: none;
        }
        .start-btn:active { transform: scale(0.95); }

        @media (max-width: 800px) {
            .game-title { font-size: 5vw; gap: 10px; } .psle-cap { font-size: 9vw; }
            .dashboard { gap: 4vw; padding: 0 10px; }
            .dial-arrow { right: -30px; font-size: 20px;}
            #btn-fire-action { font-size: 16px; border-width: 4px; box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 6px 0 #7f1d1d, 0 10px 15px rgba(0,0,0,0.6);}
            #btn-fire-action:active { transform: translateY(5px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 1px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.6);}
        }
    </style>
</head>
<body>

    <header>
        <div class="stat-box"><span class="stat-label sci-fi-text">SCORE</span><span class="stat-value sci-fi-text" id="ui-score">0</span></div>
    </header>

    <div id="combat-area">
        <canvas id="laser-canvas"></canvas>

        <div id="spaceship-container">
            <div class="spaceship">
                <div class="wing left"></div>
                <div class="ship-core" id="ship-main" onclick="handleHudClick()">
                    <div id="finger-hint">👇</div>
                    <span class="hud-text" id="hud-display"></span>
                </div>
                <div class="wing right"></div>
            </div>
        </div>

        <div id="target-mover">
            <div class="enemy-target" id="target-container">
                <div class="enemy-text" id="target-char">🎯</div>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="dial-container"><div class="dial-wrapper" id="wrap-i"><div class="dial-wheel" id="wheel-i"></div><div class="dial-track"></div><div class="dial-knob"></div></div><div class="dial-arrow">◀</div></div>
        <div class="dial-container"><div class="dial-wrapper" id="wrap-f"><div class="dial-wheel" id="wheel-f"></div><div class="dial-track"></div><div class="dial-knob"></div></div><div class="dial-arrow">◀</div></div>
        <div class="dial-container"><div class="dial-wrapper" id="wrap-t"><div class="dial-wheel" id="wheel-t"></div><div class="dial-track"></div><div class="dial-knob"></div></div><div class="dial-arrow">◀</div></div>
        <div class="action-container"><button id="btn-fire-action" class="sci-fi-text" onclick="handleFireClick()">FIRE</button></div>
    </div>

    <div id="overlay">
        <h1 class="game-title sci-fi-text">
            <div class="title-line"><span><span class="psle-cap">P</span>INYIN</span><span><span class="psle-cap">S</span>HOOTER</span></div>
            <div class="title-line"><span><span class="psle-cap">L</span>ASER</span><span><span class="psle-cap">E</span>XPEDITION</span></div>
        </h1>
        <div id="loading-ui" class="sci-fi-text">ACCESSING DATABASE...</div>
        <button class="start-btn sci-fi-text" id="btn-start" onclick="startGame()">MISSION START</button>
    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=573238154&single=true&output=csv";
    
    const TONE_MAP = {'a':['','ā','á','ǎ','à'], 'o':['','ō','ó','ǒ','ò'], 'e':['','ē','é','ě','è'], 'i':['','ī','í','ǐ','ì'], 'u':['','ū','ú','ǔ','ù'], 'ü':['','ǖ','ǘ','ǚ','ǜ']};
    const TONE_DATA_REV = {'ā':'a1','á':'a2','ǎ':'a3','à':'a4','ē':'e1','é':'e2','ě':'e3','è':'e4','ō':'o1','ó':'o2','ǒ':'o3','ò':'o4','ī':'i1','í':'i2','ǐ':'i3','ì':'i4','ū':'u1','ú':'u2','ǔ':'u3','ù':'u4','ǖ':'ü1','ǘ':'ü2','ǚ':'ü3','ǜ':'ü4'};
    const INITIALS_LIST = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];

    let DB_WORDS = [];
    let state = {
        score: 0, isPlaying: false, currentTarget: null, hatRemoved: false, 
        i: { angle: 0, opts: [], step: 0 }, f: { angle: 0, opts: [], step: 0 }, t: { angle: 0, opts: [], step: 0 },
        targetX: -20, targetSpeed: 0.05, targetActive: false 
    };

    let actx = null;

    const ALL_INITIALS = ['','b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
    const ALL_FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong','iao','ia','ian','iang','ua','uo','uan','uang','uai'];
    const ALL_TONES = ['1', '2', '3', '4', ''];

    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');

    function parsePinyin(py) {
        if (py === 'de') return { i:'d', f:'e', t:'' };
        let clean = py, tone = ''; 
        for (let char in TONE_DATA_REV) { 
            if (py.includes(char)) { tone = TONE_DATA_REV[char].slice(-1); clean = py.replace(char, TONE_DATA_REV[char][0]); break; } 
        }
        let initial = ''; 
        for (let i of INITIALS_LIST) {
            if (clean.startsWith(i)) {
                if (i.length === 2) { initial = i; break; }
                if (i.length === 1) { initial = i; }
            }
        }
        let final = initial === '' ? clean : clean.slice(initial.length);
        if (['j','q','x','y'].includes(initial) && final === 'u') final = 'ü';
        return { i: initial, f: final, t: tone };
    }

    async function loadDB() {
        try {
            const resp = await fetch(CSV_URL);
            const text = await resp.text();
            DB_WORDS = text.split('\n').slice(1).map(row => {
                const cols = row.split(',');
                if (cols.length < 7) return null;
                const py = cols[6].trim().split(' / ')[0];
                return { char: cols[4].trim(), ...parsePinyin(py), py: py };
            }).filter(w => w);
            
            if(DB_WORDS.length > 0){
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('btn-start').style.display = 'block';
            }
        } catch (e) { document.getElementById('loading-ui').innerText = "NETWORK ERROR"; }
    }

    function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
    }

    function startGame() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        initAudio(); 
        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.isPlaying = true;
        document.getElementById('ui-score').innerText = '0';
        nextTarget();
        gameLoop();
    }

    function nextTarget() {
        if (!DB_WORDS.length) return;
        state.currentTarget = DB_WORDS[Math.floor(Math.random() * DB_WORDS.length)];
        state.targetX = -10;
        state.targetActive = true;
        state.hatRemoved = false;
        
        state.targetSpeed = 0.04 + Math.random() * 0.03; 
        document.getElementById('target-char').innerText = state.currentTarget.char;
        
        buildDial('i', getOpts(state.currentTarget.i, ALL_INITIALS));
        buildDial('f', getOpts(state.currentTarget.f, ALL_FINALS));
        buildDial('t', ALL_TONES); 
    }

    function getOpts(correct, all) {
        let res = all.filter(x => x !== correct).sort(() => 0.5-Math.random()).slice(0, 6);
        res.push(correct);
        return res.sort(() => 0.5-Math.random());
    }

    // 🔥 绘制“扇形/梯形格子”的核心：通过生成 Spoke (辐条) 来分割背景
    function buildDial(type, opts) {
        state[type].opts = opts;
        state[type].step = 360 / opts.length;
        const wheel = document.getElementById(`wheel-${type}`);
        const radius = document.getElementById(`wrap-${type}`).offsetWidth * 0.38;
        
        let html = '';
        opts.forEach((o, idx) => {
            let rot = idx * state[type].step;
            // 画分隔线 (Spoke)，放在每一格的中间边界
            let spokeRot = rot - state[type].step / 2;
            html += `<div class="dial-spoke" style="transform: rotate(${spokeRot}deg) translateY(-50%);"></div>`;
            // 画文字
            html += `<div class="dial-item" style="transform: rotate(${rot}deg) translateX(${radius}px)">${o}</div>`;
        });
        
        wheel.innerHTML = html;
        state[type].angle = 0;
        updateDialVisuals(type);
    }

    function setupiPod(type) {
        const wrap = document.getElementById(`wrap-${type}`);
        const wheel = document.getElementById(`wheel-${type}`);
        let isDragging = false, prevA = 0, lastIdx = -1;

        const getA = (e) => {
            const r = wrap.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - (r.left + r.width/2);
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - (r.top + r.height/2);
            return Math.atan2(y, x) * 180 / Math.PI;
        };

        const onStart = (e) => { 
            initAudio(); 
            isDragging = true; prevA = getA(e); wheel.classList.add('dragging'); 
        };
        
        const onMove = (e) => {
            if (!isDragging) return; e.preventDefault();
            let currA = getA(e); let delta = currA - prevA;
            if (delta > 180) delta -= 360; if (delta < -180) delta += 360;
            
            state[type].angle += delta * 0.8; 
            prevA = currA;
            wheel.style.transform = `rotate(${state[type].angle}deg)`;
            
            let steps = Math.round(-state[type].angle / state[type].step);
            let activeIdx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
            
            if (activeIdx !== lastIdx) {
                if (lastIdx !== -1) playSound('mech'); 
                lastIdx = activeIdx;
                updateDialSelectionClassOnly(type, activeIdx);
                updateHUD();
            }
        };
        
        const onEnd = () => { 
            if(!isDragging) return; isDragging = false; wheel.classList.remove('dragging'); 
            let steps = Math.round(state[type].angle / state[type].step);
            state[type].angle = steps * state[type].step;
            wheel.style.transform = `rotate(${state[type].angle}deg)`;
            
            let finalIdx = (Math.round(-state[type].angle / state[type].step) % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
            updateDialSelectionClassOnly(type, finalIdx);
            updateHUD();
        };

        wrap.onmousedown = wrap.ontouchstart = onStart;
        window.addEventListener('mousemove', onMove, {passive:false});
        window.addEventListener('touchmove', onMove, {passive:false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function updateDialSelectionClassOnly(type, activeIdx) {
        const wheel = document.getElementById(`wheel-${type}`);
        // 因为包含了 spoke，过滤出 item
        const items = Array.from(wheel.querySelectorAll('.dial-item'));
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    }

    function updateDialVisuals(type) {
        const wheel = document.getElementById(`wheel-${type}`);
        wheel.style.transform = `rotate(${state[type].angle}deg)`;
        let steps = Math.round(-state[type].angle / state[type].step);
        let activeIdx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        updateDialSelectionClassOnly(type, activeIdx);
        updateHUD();
    }

    function getVal(type) {
        let steps = Math.round(-state[type].angle / state[type].step);
        let idx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        return state[type].opts[idx];
    }

    function combineTruePinyin(i, f, tStr) {
        let initial = i;
        let toneNum = parseInt(tStr);
        if (isNaN(toneNum)) return initial + f; 
        
        let v = '';
        if (f.includes('a')) v = 'a'; else if (f.includes('e')) v = 'e'; else if (f.includes('o')) v = 'o';
        else if (f.includes('ui')) v = 'i'; else if (f.includes('iu')) v = 'u'; else if (f.includes('i')) v = 'i';
        else if (f.includes('u')) v = 'u'; else if (f.includes('ü')) v = 'ü';
        
        let final = f;
        if (v) final = f.replace(v, TONE_MAP[v][toneNum]);
        return initial + final;
    }

    function updateHUD() {
        let i = getVal('i'), f = getVal('f'), t = getVal('t');
        let needsFix = ['j','q','x','y'].includes(i) && f.includes('ü');
        
        let displayF = f;
        if (needsFix) {
            if (!state.hatRemoved) {
                document.getElementById('ship-main').classList.add('needs-fix');
                document.getElementById('finger-hint').style.display = 'block';
            } else {
                displayF = f.replace(/ü/g, 'u');
                document.getElementById('ship-main').classList.remove('needs-fix');
                document.getElementById('finger-hint').style.display = 'none';
            }
        } else {
            document.getElementById('ship-main').classList.remove('needs-fix');
            document.getElementById('finger-hint').style.display = 'none';
        }

        document.getElementById('hud-display').innerText = combineTruePinyin(i, displayF, t);
    }

    function handleHudClick() {
        if (document.getElementById('ship-main').classList.contains('needs-fix')) {
            state.hatRemoved = true; updateHUD();
            confetti({ particleCount: 20, origin: { x: 0.1, y: 0.5 }, colors:['#fff','#00f0ff'], startVelocity: 15, ticks: 50 });
        }
    }

    function handleFireClick() {
        if (!state.isPlaying || !state.targetActive) return;
        
        if (document.getElementById('ship-main').classList.contains('needs-fix')) {
            playSound('wrong');
            document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1.5)';
            setTimeout(() => document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1)', 200);
            return;
        }

        drawLaser();
        if (getVal('i') === state.currentTarget.i && getVal('f') === state.currentTarget.f && getVal('t') === state.currentTarget.t) {
            state.targetActive = false;
            state.score += 10; document.getElementById('ui-score').innerText = state.score;
            confetti({ particleCount: 40, origin: { x: 0.8, y: 0.5 }, colors:['#39ff14','#00f0ff','#fff'] });
            setTimeout(nextTarget, 1000);
        } else {
            playSound('wrong');
        }
    }

    function gameLoop() {
        if (!state.isPlaying) return;
        if (state.targetActive) {
            state.targetX += state.targetSpeed;
            document.getElementById('target-mover').style.right = state.targetX + 'vw';
            if (state.targetX > 105) { state.targetActive = false; playSound('wrong'); setTimeout(nextTarget, 1000); }
        }
        requestAnimationFrame(gameLoop);
    }

    function drawLaser() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ship = document.getElementById('ship-main').getBoundingClientRect();
        const enemy = document.getElementById('target-container').getBoundingClientRect();
        ctx.beginPath(); ctx.moveTo(ship.left+ship.width, ship.top+ship.height/2);
        ctx.lineTo(enemy.left+enemy.width/2, enemy.top+enemy.height/2);
        ctx.lineWidth = 6; ctx.strokeStyle = "#00f0ff"; ctx.stroke();
        ctx.shadowBlur = 20; ctx.shadowColor = "#00f0ff"; ctx.stroke();
        playSound('laser');
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 100);
    }

    function playSound(type) {
        if (!actx) return;
        let osc = actx.createOscillator(); let g = actx.createGain();
        osc.connect(g); g.connect(actx.destination);
        if(type === 'mech'){ 
            osc.type = 'square'; osc.frequency.setValueAtTime(150, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.03);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.03);
            osc.start(); osc.stop(actx.currentTime + 0.03);
        }
        else if(type === 'laser'){ 
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.2);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.2);
            osc.start(); osc.stop(actx.currentTime + 0.2);
        }
        else if(type === 'wrong'){ 
            osc.type = 'square'; osc.frequency.setValueAtTime(120, actx.currentTime); 
            g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
            osc.start(); osc.stop(actx.currentTime + 0.3);
        }
    }

    setupiPod('i'); setupiPod('f'); setupiPod('t');
    loadDB();
</script>
