<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinyin Shooter: Laser Expedition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent-glow: #00f0ff; 
            --correct-color: #39ff14; 
            --wrong-color: #ff003c;   
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; color: #fff; 
            font-family: 'Microsoft YaHei', sans-serif;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%), 
                radial-gradient(circle at 85% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        .sci-fi-text { font-family: 'Orbitron', sans-serif; }

        header {
            display: flex; justify-content: flex-end; align-items: center;
            padding: 10px 20px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(5px);
            border-bottom: 2px solid rgba(0, 240, 255, 0.2); z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stat-box { display: flex; flex-direction: column; align-items: flex-end; min-width: 80px; }
        .stat-label { font-size: 12px; color: var(--accent-glow); font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }

        /* ⚔️ 战斗区域 */
        #combat-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; }
        #laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 🚀 飞船 */
        #spaceship-container { position: absolute; left: 30px; top: 50%; transform: translateY(-50%) rotate(90deg); z-index: 10; }
        .spaceship { position: relative; width: 80px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .wing { position: absolute; width: 30px; height: 15px; background: rgba(15, 23, 42, 0.9); top: 18px; border-bottom: 2px solid var(--accent-glow); }
        .wing.left { left: 0; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); }
        .wing.right { right: 0; clip-path: polygon(0 0, 80% 0, 100% 100%, 0 100%); }
        
        .ship-core {
            width: 50px; height: 50px; background: #050505; border: 3px solid var(--accent-glow); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 12; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6), inset 0 0 15px rgba(0, 240, 255, 0.4); position: relative;
        }
        
        .hud-text { display: inline-block; transform: rotate(-90deg); font-size: 22px; font-weight: 900; color: #fff; font-family: sans-serif;}
        
        /* 红灯报警状态 */
        .ship-core.needs-fix { border-color: var(--wrong-color); box-shadow: 0 0 30px var(--wrong-color), inset 0 0 15px var(--wrong-color); animation: pulseRed 0.8s infinite alternate; }
        @keyframes pulseRed { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* 👇 脱帽手指提示 (延迟出现) */
        #finger-hint {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%) rotate(-90deg);
            font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
            animation: pointDown 0.6s infinite alternate cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: none; z-index: 20; pointer-events: none;
        }
        @keyframes pointDown { from { top: -60px; } to { top: -40px; } }

        /* 👾 怪物 */
        #target-mover { position: absolute; top: 50%; right: -100px; transform: translateY(-50%); z-index: 8; }
        .enemy-target {
            width: 45px; height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.5);
            transform: rotate(45deg); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.1); backdrop-filter: blur(4px); transition: transform 0.3s;
        }
        .enemy-text { transform: rotate(-45deg); font-size: 24px; font-weight: 900; color: #fff; }

        /* 💥 爆炸动画 (正确) */
        .enemy-target.explode { transform: rotate(45deg) scale(0) !important; opacity: 0; transition: all 0.3s ease-in; }
        
        /* 🛡️ 护盾闪光动画 (错误) */
        .enemy-target.shield { animation: shieldFlash 0.5s ease-out; }
        @keyframes shieldFlash {
            0% { box-shadow: 0 0 0px #00f0ff, inset 0 0 0px #00f0ff; filter: brightness(1); }
            50% { box-shadow: 0 0 40px #00f0ff, inset 0 0 30px #00f0ff; filter: brightness(2); border-color: #00f0ff; transform: rotate(45deg) scale(1.1);}
            100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); filter: brightness(1); border-color: rgba(255,255,255,0.5); transform: rotate(45deg) scale(1);}
        }

        /* 飘字提示 */
        #rule-toast {
            position: absolute; top: 20%; left: 0; width: 100%; text-align: center;
            color: #ff003c; font-size: 20px; font-weight: 900; opacity: 0; pointer-events: none;
            transition: all 0.3s; text-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 50; letter-spacing: 2px;
        }

        /* 🎛️ 底部仪表盘区 */
        .dashboard {
            height: 26vh; min-height: 220px; background: linear-gradient(to bottom, #d1d5db, #9ca3af); 
            border-top: 6px solid #f3f4f6; display: flex; justify-content: center; align-items: flex-end; gap: 4vw; border-radius: 30px 30px 0 0;
            box-shadow: inset 0 5px 15px rgba(255,255,255,0.7), 0 -15px 40px rgba(0,0,0,0.8); padding: 20px 4vw 30px 4vw;
        }

        .control-unit { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .dial-readout {
            width: 90%; height: 35px; background: #0f172a; border: 2px solid var(--accent-glow); border-radius: 6px;
            display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; color: #fff; font-family: sans-serif;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 0 8px rgba(0, 0, 0, 0.8); text-shadow: 0 0 5px var(--accent-glow);
        }

        /* 💣 核心重写：3D 横向拨轮暗槽 */
        .thumbwheel-container { 
            position: relative; width: 22vw; max-width: 140px; height: 50px; /* 扁平长方形 */
            background: #0b0f19; border-radius: 8px; border: 3px solid #64748b; 
            box-shadow: inset 0 15px 25px rgba(0,0,0,0.9), 0 2px 5px rgba(255,255,255,0.6); 
            perspective: 800px; cursor: grab;
        }
        .thumbwheel-container:active { cursor: grabbing; }

        /* 横向滚筒 */
        .thumbwheel-cylinder { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            transform-style: preserve-3d; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .thumbwheel-cylinder.dragging { transition: none !important; }

        /* 刻度字幕 */
        .thumbwheel-item { 
            position: absolute; top: 0; left: 50%; width: 50px; height: 100%; margin-left: -25px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 18px; font-weight: bold; color: #475569; backface-visibility: hidden; white-space: nowrap;
        }
        .thumbwheel-item.active { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--accent-glow); filter: drop-shadow(0 2px 2px #000); }
        
        /* 🔥 两侧深邃渐变遮罩 (完美符合老式收音机调频的视觉) */
        .thumbwheel-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: 4px;
            background: linear-gradient(to right,
                rgba(11, 15, 25, 1) 0%,
                rgba(11, 15, 25, 0.8) 15%,
                rgba(11, 15, 25, 0) 35%,
                rgba(11, 15, 25, 0) 65%,
                rgba(11, 15, 25, 0.8) 85%,
                rgba(11, 15, 25, 1) 100%
            );
        }

        .action-container { display: flex; justify-content: center; align-items: center; margin-left: 2vw; margin-bottom: 25px;}
        #btn-fire-action {
            width: 20vw; max-width: 110px; aspect-ratio: 1; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b91c1c);
            border: 6px solid #450a0a; color: white; font-size: 20px; font-weight: 900; 
            cursor: pointer; transition: 0.1s; letter-spacing: 2px;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 10px 0 #7f1d1d, 0 15px 25px rgba(0,0,0,0.6);
            text-shadow: -1px -1px 0 rgba(0,0,0,0.4);
        }
        #btn-fire-action:active { transform: translateY(8px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 2px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.6); background: radial-gradient(circle at 30% 30%, #cc0000, #7f1d1d); }

        /* Loading */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .game-title { display: flex; flex-direction: column; align-items: center; gap: 15px; font-size: 36px; color: #fff; margin-bottom: 50px; text-shadow: 0 0 20px var(--accent-glow); text-align: center; letter-spacing: 4px; }
        .title-line { display: flex; gap: 20px; }
        .psle-cap { color: #fbbf24; font-size: 64px; text-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }

        #loading-ui { color: var(--accent-glow); font-size: 20px; letter-spacing: 3px; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }

        .start-btn { 
            padding: 18px 50px; border: 2px solid var(--accent-glow); background: rgba(0, 240, 255, 0.05); color: var(--accent-glow); 
            font-size: 26px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.2);
            letter-spacing: 3px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: all 0.2s; display: none;
        }
        .start-btn:active { transform: scale(0.95); }

        @media (max-width: 800px) {
            .game-title { font-size: 5vw; gap: 10px; } .psle-cap { font-size: 9vw; }
            .dashboard { gap: 3vw; padding: 15px 10px 20px 10px; }
            .dial-readout { height: 28px; font-size: 16px; }
            .thumbwheel-container { height: 45px; border-width: 2px;}
            .thumbwheel-item.active { font-size: 22px; }
            #btn-fire-action { font-size: 16px; border-width: 4px; box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 6px 0 #7f1d1d, 0 10px 15px rgba(0,0,0,0.6);}
            #btn-fire-action:active { transform: translateY(5px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 1px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.6);}
        }
    </style>
</head>
<body>

    <header>
        <div class="stat-box"><span class="stat-label sci-fi-text">SCORE</span><span class="stat-value sci-fi-text" id="ui-score">0</span></div>
    </header>

    <div id="combat-area">
        <canvas id="laser-canvas"></canvas>
        
        <div id="rule-toast">警告信息</div>

        <div id="spaceship-container">
            <div class="spaceship">
                <div class="wing left"></div>
                <div class="ship-core" id="ship-main" onclick="handleHudClick()">
                    <div id="finger-hint">👇</div>
                    <span class="hud-text" id="hud-display"></span>
                </div>
                <div class="wing right"></div>
            </div>
        </div>

        <div id="target-mover">
            <div class="enemy-target" id="target-container">
                <div class="enemy-text" id="target-char">🎯</div>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="control-unit">
            <div class="dial-readout" id="readout-i">-</div>
            <div class="thumbwheel-container" id="wrap-i">
                <div class="thumbwheel-overlay"></div>
                <div class="thumbwheel-cylinder" id="wheel-i"></div>
            </div>
        </div>
        <div class="control-unit">
            <div class="dial-readout" id="readout-f">-</div>
            <div class="thumbwheel-container" id="wrap-f">
                <div class="thumbwheel-overlay"></div>
                <div class="thumbwheel-cylinder" id="wheel-f"></div>
            </div>
        </div>
        <div class="control-unit">
            <div class="dial-readout" id="readout-t">-</div>
            <div class="thumbwheel-container" id="wrap-t">
                <div class="thumbwheel-overlay"></div>
                <div class="thumbwheel-cylinder" id="wheel-t"></div>
            </div>
        </div>
        <div class="action-container"><button id="btn-fire-action" class="sci-fi-text" onclick="handleFireClick()">FIRE</button></div>
    </div>

    <div id="overlay">
        <h1 class="game-title sci-fi-text">
            <div class="title-line"><span><span class="psle-cap">P</span>INYIN</span><span><span class="psle-cap">S</span>HOOTER</span></div>
            <div class="title-line"><span><span class="psle-cap">L</span>ASER</span><span><span class="psle-cap">E</span>XPEDITION</span></div>
        </h1>
        <div id="loading-ui" class="sci-fi-text">ACCESSING DATABASE...</div>
        <button class="start-btn sci-fi-text" id="btn-start" onclick="startGame()">MISSION START</button>
    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=573238154&single=true&output=csv";
    
    const TONE_MAP = {'a':['','ā','á','ǎ','à'], 'o':['','ō','ó','ǒ','ò'], 'e':['','ē','é','ě','è'], 'i':['','ī','í','ǐ','ì'], 'u':['','ū','ú','ǔ','ù'], 'ü':['','ǖ','ǘ','ǚ','ǜ']};
    const TONE_DATA_REV = {'ā':'a1','á':'a2','ǎ':'a3','à':'a4','ē':'e1','é':'e2','ě':'e3','è':'e4','ō':'o1','ó':'o2','ǒ':'o3','ò':'o4','ī':'i1','í':'i2','ǐ':'i3','ì':'i4','ū':'u1','ú':'u2','ǔ':'u3','ù':'u4','ǖ':'ü1','ǘ':'ü2','ǚ':'ü3','ǜ':'ü4'};
    const INITIALS_LIST = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];

    // 💡 拼音合法性规则表 (该声母可接的所有韵母)
    const VALID_MAP = {
        '': 'a,o,e,ai,ei,ao,ou,an,en,ang,eng,er',
        'b': 'a,o,i,u,ai,ei,ao,an,en,ang,eng,ian,iao,ie,in,ing',
        'p': 'a,o,i,u,ai,ei,ao,ou,an,en,ang,eng,ian,iao,ie,in,ing',
        'm': 'a,o,e,i,u,ai,ei,ao,ou,an,en,ang,eng,ian,iao,ie,in,ing,iu',
        'f': 'a,o,u,ei,ou,an,en,ang,eng',
        'd': 'a,e,i,u,ai,ei,ao,ou,an,en,ang,eng,ong,ia,ian,iao,ie,iu,ing,uo,ui,uan,un',
        't': 'a,e,i,u,ai,ao,ou,an,ang,eng,ong,ian,iao,ie,ing,uo,ui,uan,un',
        'n': 'a,e,i,u,ü,ai,ei,ao,ou,an,en,ang,eng,ong,ian,iang,iao,ie,in,ing,iu,uo,uan,un,üe',
        'l': 'a,e,i,u,ü,ai,ei,ao,ou,an,ang,eng,ong,ia,ian,iang,iao,ie,in,ing,iu,uo,uan,un,üe',
        'g': 'a,e,u,ai,ei,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'k': 'a,e,u,ai,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'h': 'a,e,u,ai,ei,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'j': 'i,ia,ian,iang,iao,ie,in,ing,iong,iu,ü,üan,üe,ün',
        'q': 'i,ia,ian,iang,iao,ie,in,ing,iong,iu,ü,üan,üe,ün',
        'x': 'i,ia,ian,iang,iao,ie,in,ing,iong,iu,ü,üan,üe,ün',
        'zh': 'a,e,i,u,ai,ei,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'ch': 'a,e,i,u,ai,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'sh': 'a,e,i,u,ai,ei,ao,ou,an,en,ang,eng,ong,ua,uai,uan,uang,ui,un,uo',
        'r': 'e,i,u,ao,ou,an,en,ang,eng,ong,ua,uan,ui,un,uo',
        'z': 'a,e,i,u,ai,ei,ao,ou,an,en,ang,eng,ong,uan,ui,un,uo',
        'c': 'a,e,i,u,ai,ao,ou,an,en,ang,eng,ong,uan,ui,un,uo',
        's': 'a,e,i,u,ai,ao,ou,an,en,ang,eng,ong,uan,ui,un,uo',
        'y': 'a,e,i,o,ao,ou,an,en,ang,eng,ong,ü,üan,üe,ün',
        'w': 'a,o,u,ai,ei,an,en,ang,eng'
    };

    let DB_WORDS = [];
    let state = {
        score: 0, isPlaying: false, currentTarget: null, hatRemoved: false, 
        i: { angle: 0, opts: [], step: 0, radius: 0 }, f: { angle: 0, opts: [], step: 0, radius: 0 }, t: { angle: 0, opts: [], step: 0, radius: 0 },
        targetX: -20, targetSpeed: 0.05, targetActive: false 
    };

    let actx = null;

    const ALL_INITIALS = ['','b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
    const ALL_FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong','iao','ia','ian','iang','ua','uo','uan','uang','uai'];
    const ALL_TONES = ['1', '2', '3', '4', ''];

    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');

    function parsePinyin(py) {
        if (py === 'de') return { i:'d', f:'e', t:'' };
        let clean = py, tone = ''; 
        for (let char in TONE_DATA_REV) { 
            if (py.includes(char)) { tone = TONE_DATA_REV[char].slice(-1); clean = py.replace(char, TONE_DATA_REV[char][0]); break; } 
        }
        let initial = ''; 
        for (let i of INITIALS_LIST) {
            if (clean.startsWith(i)) { if (i.length === 2) { initial = i; break; } if (i.length === 1) { initial = i; } }
        }
        let final = initial === '' ? clean : clean.slice(initial.length);
        if (['j','q','x','y'].includes(initial) && final === 'u') final = 'ü';
        return { i: initial, f: final, t: tone };
    }

    async function loadDB() {
        try {
            const resp = await fetch(CSV_URL);
            const text = await resp.text();
            DB_WORDS = text.split('\n').slice(1).map(row => {
                const cols = row.split(',');
                if (cols.length < 7) return null;
                const py = cols[6].trim().split(' / ')[0];
                return { char: cols[4].trim(), ...parsePinyin(py), py: py };
            }).filter(w => w);
            
            if(DB_WORDS.length > 0){
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('btn-start').style.display = 'block';
            }
        } catch (e) { document.getElementById('loading-ui').innerText = "NETWORK ERROR"; }
    }

    function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
    }

    function startGame() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        initAudio(); 
        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.isPlaying = true;
        document.getElementById('ui-score').innerText = '0';
        nextTarget();
        gameLoop();
    }

    function nextTarget() {
        if (!DB_WORDS.length) return;
        state.currentTarget = DB_WORDS[Math.floor(Math.random() * DB_WORDS.length)];
        state.targetX = -10; state.targetActive = true; state.hatRemoved = false;
        document.getElementById('ship-main').classList.remove('needs-fix');
        document.getElementById('finger-hint').style.display = 'none';
        
        state.targetSpeed = 0.04 + Math.random() * 0.03; 
        document.getElementById('target-char').innerText = state.currentTarget.char;
        
        buildThumbwheel('i', getOpts(state.currentTarget.i, ALL_INITIALS));
        buildThumbwheel('f', getOpts(state.currentTarget.f, ALL_FINALS));
        buildThumbwheel('t', ALL_TONES); 
    }

    function getOpts(correct, all) {
        let res = all.filter(x => x !== correct).sort(() => 0.5-Math.random()).slice(0, 6);
        res.push(correct);
        return res.sort(() => 0.5-Math.random());
    }

    // 💣 构建 3D 横向拨轮
    function buildThumbwheel(type, opts) {
        state[type].opts = opts;
        state[type].step = 360 / opts.length;
        const wheel = document.getElementById(`wheel-${type}`);
        
        // 动态计算横向圆柱的半径：确保文字宽度不重叠 (ItemWidth = 50)
        let radius = Math.max((opts.length * 50) / (2 * Math.PI), 45);
        state[type].radius = radius;

        let html = '';
        opts.forEach((o, idx) => {
            // 绕 Y 轴旋转，将刻度沿圆周分布
            let rot = idx * state[type].step;
            html += `<div class="thumbwheel-item" style="transform: rotateY(${-rot}deg) translateZ(${radius}px)">${o}</div>`;
        });
        
        wheel.innerHTML = html;
        state[type].angle = 0;
        updateThumbwheelVisuals(type);
    }

    // 💣 横向滑动交互物理引擎
    function setupThumbwheel(type) {
        const wrap = document.getElementById(`wrap-${type}`);
        const wheel = document.getElementById(`wheel-${type}`);
        let isDragging = false, prevX = 0, lastIdx = -1;

        const getX = (e) => e.touches ? e.touches[0].clientX : e.clientX;

        const onStart = (e) => { 
            initAudio(); 
            isDragging = true; prevX = getX(e); wheel.classList.add('dragging'); 
            // 清除之前的红灯状态
            state.hatRemoved = false;
            document.getElementById('ship-main').classList.remove('needs-fix');
            document.getElementById('finger-hint').style.display = 'none';
        };
        
        const onMove = (e) => {
            if (!isDragging) return; e.preventDefault();
            let currX = getX(e); 
            let deltaX = currX - prevX; 
            prevX = currX;

            // 滑动像素转换为角度 (阻尼系数 0.8)
            let deltaAngle = (deltaX / 50) * state[type].step * 0.8;
            state[type].angle += deltaAngle;
            
            // 实时跟手旋转
            wheel.style.transform = `translateZ(${-state[type].radius}px) rotateY(${state[type].angle}deg)`;
            
            let steps = Math.round(state[type].angle / state[type].step);
            let activeIdx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
            
            if (activeIdx !== lastIdx) {
                if (lastIdx !== -1) playSound('mech'); 
                lastIdx = activeIdx;
                updateSelection(type, activeIdx);
                updateHUD();
            }
        };
        
        const onEnd = () => { 
            if(!isDragging) return; isDragging = false; wheel.classList.remove('dragging'); 
            
            // 自动回弹吸附刻度
            let steps = Math.round(state[type].angle / state[type].step);
            state[type].angle = steps * state[type].step;
            wheel.style.transform = `translateZ(${-state[type].radius}px) rotateY(${state[type].angle}deg)`;
            
            let finalIdx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
            updateSelection(type, finalIdx);
            updateHUD();
        };

        wrap.onmousedown = wrap.ontouchstart = onStart;
        window.addEventListener('mousemove', onMove, {passive:false});
        window.addEventListener('touchmove', onMove, {passive:false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function updateSelection(type, activeIdx) {
        const wheel = document.getElementById(`wheel-${type}`);
        const items = Array.from(wheel.querySelectorAll('.thumbwheel-item'));
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    }

    function updateThumbwheelVisuals(type) {
        const wheel = document.getElementById(`wheel-${type}`);
        wheel.style.transform = `translateZ(${-state[type].radius}px) rotateY(${state[type].angle}deg)`;
        let steps = Math.round(state[type].angle / state[type].step);
        let activeIdx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        updateSelection(type, activeIdx);
        updateHUD();
    }

    function getVal(type) {
        let steps = Math.round(state[type].angle / state[type].step);
        let idx = (steps % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        return state[type].opts[idx];
    }

    function combineTruePinyin(i, f, tStr) {
        let initial = i; let toneNum = parseInt(tStr);
        if (isNaN(toneNum)) return initial + f; 
        let v = '';
        if (f.includes('a')) v = 'a'; else if (f.includes('e')) v = 'e'; else if (f.includes('o')) v = 'o';
        else if (f.includes('ui')) v = 'i'; else if (f.includes('iu')) v = 'u'; else if (f.includes('i')) v = 'i';
        else if (f.includes('u')) v = 'u'; else if (f.includes('ü')) v = 'ü';
        let final = f;
        if (v) final = f.replace(v, TONE_MAP[v][toneNum]);
        return initial + final;
    }

    function showToast(msg) {
        const toast = document.getElementById('rule-toast');
        toast.innerText = msg;
        toast.style.opacity = 1;
        toast.style.transform = 'translateY(-20px)';
        setTimeout(() => { toast.style.opacity = 0; toast.style.transform = 'translateY(0)'; }, 2000);
    }

    function updateHUD() {
        let i = getVal('i'), f = getVal('f'), t = getVal('t');
        
        document.getElementById('readout-i').innerText = i === '' ? '-' : i;
        document.getElementById('readout-f').innerText = f;
        document.getElementById('readout-t').innerText = t === '' ? '-' : t;

        // 平时操作时不马上报错，只需拼音展示
        let displayF = f;
        if (['j','q','x','y'].includes(i) && f.includes('ü') && state.hatRemoved) {
            displayF = f.replace(/ü/g, 'u');
        }
        document.getElementById('hud-display').innerText = combineTruePinyin(i, displayF, t);
    }

    // 🛡️ 手动脱帽交互
    function handleHudClick() {
        if (document.getElementById('ship-main').classList.contains('needs-fix')) {
            state.hatRemoved = true; 
            document.getElementById('ship-main').classList.remove('needs-fix');
            document.getElementById('finger-hint').style.display = 'none';
            updateHUD();
            playSound('pop');
            confetti({ particleCount: 20, origin: { x: 0.1, y: 0.5 }, colors:['#fff','#00f0ff'], startVelocity: 15, ticks: 50 });
        }
    }

    // 💥 FIRE 按钮：真正的规则校验中心
    function handleFireClick() {
        if (!state.isPlaying || !state.targetActive) return;
        
        let i = getVal('i'), f = getVal('f'), t = getVal('t');

        // 1. 校验拼音是否存在
        let isValid = VALID_MAP[i] && VALID_MAP[i].split(',').includes(f);
        if (!isValid) {
            playSound('error');
            showToast("⚠️ 错误：不存在这个拼音组合！");
            return; // 拦截开火
        }

        // 2. 校验是否需要脱帽 (延迟警报机制)
        let needsFix = ['j','q','x','y'].includes(i) && f.includes('ü');
        if (needsFix && !state.hatRemoved) {
            playSound('error');
            showToast("⚠️ j q x y 遇到 ü 要脱帽！");
            document.getElementById('ship-main').classList.add('needs-fix');
            document.getElementById('finger-hint').style.display = 'block';
            
            // 闪动手指提示
            document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1.5)';
            setTimeout(() => document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1)', 200);
            return; // 拦截开火
        }

        // 3. 正常发射
        drawLaser();
        
        let isCorrect = (i === state.currentTarget.i && f === state.currentTarget.f && t === state.currentTarget.t);
        let tc = document.getElementById('target-container');

        if (isCorrect) {
            // ✅ 完全正确：微缩爆炸消失
            state.targetActive = false;
            state.score += 10; document.getElementById('ui-score').innerText = state.score;
            
            tc.classList.add('explode');
            playSound('explode');
            confetti({ particleCount: 60, spread: 80, origin: { x: 0.8, y: 0.5 }, colors:['#39ff14','#00f0ff','#fff'] });
            
            setTimeout(() => { tc.classList.remove('explode'); nextTarget(); }, 1200);
        } else {
            // 🛡️ 拼音合法，但不是目标答案：激活幽蓝护盾
            tc.classList.remove('shield'); void tc.offsetWidth; 
            tc.classList.add('shield');
            playSound('shield');
            showToast("❌ 拼音正确，但不是这个字！");
        }
    }

    function gameLoop() {
        if (!state.isPlaying) return;
        if (state.targetActive) {
            state.targetX += state.targetSpeed;
            document.getElementById('target-mover').style.right = state.targetX + 'vw';
            // 怪物跑出屏幕外，扣分/重来
            if (state.targetX > 105) { 
                state.targetActive = false; playSound('error'); setTimeout(nextTarget, 1000); 
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function drawLaser() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ship = document.getElementById('ship-main').getBoundingClientRect();
        const enemy = document.getElementById('target-container').getBoundingClientRect();
        ctx.beginPath(); ctx.moveTo(ship.left+ship.width, ship.top+ship.height/2);
        ctx.lineTo(enemy.left+enemy.width/2, enemy.top+enemy.height/2);
        ctx.lineWidth = 8; ctx.strokeStyle = "#00f0ff"; 
        ctx.shadowBlur = 20; ctx.shadowColor = "#00f0ff"; ctx.stroke();
        playSound('laser');
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 120);
    }

    // 🎛️ 音频合成引擎
    function playSound(type) {
        if (!actx) return;
        let osc = actx.createOscillator(); let g = actx.createGain();
        osc.connect(g); g.connect(actx.destination);

        if(type === 'mech'){ 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 0.04);
            g.gain.setValueAtTime(0.4, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.04);
            osc.start(); osc.stop(actx.currentTime + 0.04);
        }
        else if(type === 'laser'){ 
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.2);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.2);
            osc.start(); osc.stop(actx.currentTime + 0.2);
        }
        else if(type === 'pop'){ 
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime + 0.05);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);
            osc.start(); osc.stop(actx.currentTime + 0.1);
        }
        else if(type === 'error'){ 
            // 连续两声刺耳的低频蜂鸣
            osc.type = 'square'; osc.frequency.setValueAtTime(100, actx.currentTime); 
            g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);
            osc.start(); osc.stop(actx.currentTime + 0.1);
            
            let osc2 = actx.createOscillator(); let g2 = actx.createGain();
            osc2.type = 'square'; osc2.frequency.setValueAtTime(100, actx.currentTime + 0.15); 
            g2.gain.setValueAtTime(0.2, actx.currentTime + 0.15); g2.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.25);
            osc2.connect(g2); g2.connect(actx.destination);
            osc2.start(actx.currentTime + 0.15); osc2.stop(actx.currentTime + 0.25);
        }
        else if (type === 'shield') {
            // 高频护盾反弹音
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(400, actx.currentTime + 0.3);
            g.gain.setValueAtTime(0.4, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
            osc.start(); osc.stop(actx.currentTime + 0.3);
        }
        else if (type === 'explode') {
            // 沉闷的爆炸轰鸣音爆
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(10, actx.currentTime + 0.5);
            g.gain.setValueAtTime(0.6, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.5);
            osc.start(); osc.stop(actx.currentTime + 0.5);
        }
    }

    setupThumbwheel('i'); setupThumbwheel('f'); setupThumbwheel('t');
    loadDB();
</script>
