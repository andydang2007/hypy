<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>学习游戏中心</title>

<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        background:
            radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
            linear-gradient(180deg, #0f172a, #020617);
        color: #fff;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
    }

    .container {
        width: 100%;
        max-width: 820px;
        text-align: center;
    }

    .title {
        margin: 0;
        font-size: clamp(34px, 7vw, 64px);
        font-weight: 900;
        letter-spacing: 2px;
        line-height: 1.1;
        text-shadow: 0 0 18px rgba(56, 189, 248, 0.55);
    }

    .subtitle {
        margin: 16px 0 36px;
        color: #cbd5e1;
        font-size: clamp(15px, 3vw, 20px);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 180px;
        padding: 26px 20px;
        text-decoration: none;
        color: #fff;
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        backdrop-filter: blur(8px);
    }

    .card:hover {
        transform: translateY(-6px);
        border-color: rgba(56, 189, 248, 0.75);
        box-shadow: 0 22px 60px rgba(56, 189, 248, 0.18);
    }

    .card:active {
        transform: scale(0.97);
    }

    .icon {
        font-size: 48px;
        margin-bottom: 16px;
    }

    .card-title {
        font-size: 26px;
        font-weight: 900;
        margin-bottom: 8px;
    }

    .desc {
        color: #cbd5e1;
        font-size: 15px;
        line-height: 1.5;
    }

    .footer {
        margin-top: 34px;
        color: #64748b;
        font-size: 13px;
    }

    @media (max-width: 760px) {
        body {
            padding: 22px;
        }

        .grid {
            grid-template-columns: 1fr;
        }

        .card {
            min-height: 140px;
        }
    }
</style>
</head>

<body>
    <main class="container">
        <h1 class="title">学习游戏中心</h1>
        <p class="subtitle">选择一个游戏开始练习</p>

        <section class="grid">
            <a class="card" href="spelling.html">
                <div class="icon">✍️</div>
                <div class="card-title">学听写</div>
                <div class="desc">听、看、写，练习词语与拼写。</div>
            </a>

            <a class="card" href="hypy.html">
                <div class="icon">🚀</div>
                <div class="card-title">练拼音</div>
                <div class="desc">选择声母、韵母和声调，完成拼音挑战。</div>
            </a>

            <a class="card" href="radical.html">
                <div class="icon">🧩</div>
                <div class="card-title">认汉字</div>
                <div class="desc">拆部件、认结构，提升汉字识别能力。</div>
            </a>
        </section>

        <div class="footer">Learning Game Hub</div>
    </main>
</body>
</html>
