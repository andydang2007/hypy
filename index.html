<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinyin Space Shooter</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1e293b;
            --accent-glow: #38bdf8;
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; }
        
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at top, #1e293b 0%, #0b0f19 100%); 
            color: var(--text-main); 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* --- 顶部信息栏 --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(15, 23, 42, 0.8);
            border-bottom: 2px solid rgba(56, 189, 248, 0.3); z-index: 10;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: bold; }
        .stat-value { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--accent-glow); }
        
        #btn-start {
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; 
            padding: 8px 25px; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* --- 游戏战斗区 (星空) --- */
        #combat-zone {
            flex: 1; position: relative; overflow: hidden;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; background-position: 0 0;
            animation: starMove 20s linear infinite;
        }
        @keyframes starMove { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        /* 移动的靶子 (缩小到原来的1/4) */
        #target-entity {
            position: absolute; top: 20%; right: -60px; /* 初始在屏幕右侧外 */
            width: 50px; height: 50px; border-radius: 50%;
            background: repeating-radial-gradient(circle, #ef4444 0, #ef4444 5px, #fff 5px, #fff 10px);
            border: 2px solid #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }
        .target-char {
            width: 30px; height: 30px; background: rgba(255,255,255,0.9); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 900; color: #0f172a;
        }
        
        /* 靶子状态 */
        .target-hit { filter: hue-rotate(100deg) brightness(1.5) drop-shadow(0 0 20px #22c55e); transform: scale(1.3); transition: 0.2s; }
        .target-miss { filter: grayscale(1) brightness(0.5); border-color: red; box-shadow: 0 0 20px red; }

        /* 飞船主体 (下方居中) */
        #spaceship {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        
        /* 纯CSS画的简易飞船外形 */
        .ship-body {
            position: absolute; width: 0; height: 0;
            border-left: 40px solid transparent; border-right: 40px solid transparent;
            border-bottom: 60px solid #0284c7; filter: drop-shadow(0 -5px 15px rgba(56,189,248,0.5));
        }
        .ship-wing {
            position: absolute; bottom: 0; width: 90px; height: 20px;
            background: #0369a1; border-radius: 10px; z-index: -1;
        }
        
        /* 飞船 HUD：显示组合好的子弹 */
        #hud-bullet {
            position: absolute; top: 25px; width: 44px; height: 44px;
            background: rgba(15, 23, 42, 0.9); border: 2px solid var(--accent-glow);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-glow), inset 0 0 10px var(--accent-glow);
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 18px; font-weight: bold; z-index: 2;
        }

        #laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }

        /* --- 下方仪表盘 (三个圆盘) --- */
        #dashboard {
            height: 220px; background: var(--panel-bg);
            border-top: 3px solid #334155; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; padding: 10px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5); position: relative; z-index: 20;
        }

        .dials-container { display: flex; justify-content: space-around; align-items: center; flex: 1; }
        
        .dial-wrapper { display: flex; flex-direction: column; align-items: center; }
        .dial-title { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; letter-spacing: 1px;}
        
        /* 圆盘本身 */
        .radar-dial {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            border: 3px solid #475569; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        /* 选中的指示器 (顶部12点钟方向) */
        .dial-indicator {
            position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 12px solid var(--accent-glow); z-index: 10;
        }

        /* 圆盘上的选项 (容器需要跟着盘转，文字本身要反向转) */
        .dial-item-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .dial-text {
            position: absolute; top: 8px; left: 50%; width: 30px; margin-left: -15px;
            text-align: center; font-size: 16px; font-weight: bold; color: var(--text-muted);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
        }
        .dial-text.active { color: #fff; font-size: 22px; font-weight: 900; text-shadow: 0 0 8px #fff; top: 4px;}

        /* 开火按钮 */
        .fire-zone { display: flex; justify-content: center; padding-bottom: 5px; }
        #btn-fire {
            width: 90%; max-width: 300px; height: 50px;
            background: linear-gradient(to bottom, #ef4444, #b91c1c);
            border: 3px solid #f87171; border-radius: 25px; color: white; font-size: 22px; font-weight: 900;
            box-shadow: 0 6px 0 #7f1d1d; cursor: pointer; letter-spacing: 2px;
        }
        #btn-fire:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 #7f1d1d; }
        #btn-fire:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <header>
        <button id="btn-start" onclick="startGame()">START</button>
        <div class="stat-box"><span class="stat-label">SCORE</span><span class="stat-value" id="ui-score">0</span></div>
        <div class="stat-box"><span class="stat-label">TIME</span><span class="stat-value" id="ui-time" style="color: #fca5a5;">60</span></div>
    </header>

    <div id="combat-zone">
        <canvas id="laser-canvas"></canvas>
        
        <div id="target-entity">
            <div class="target-char" id="target-char">🎯</div>
        </div>

        <div id="spaceship">
            <div class="ship-wing"></div>
            <div class="ship-body"></div>
            <div id="hud-bullet">--</div>
        </div>
    </div>

    <div id="dashboard">
        <div class="dials-container">
            <div class="dial-wrapper">
                <div class="dial-title">声母 (L/R Tap)</div>
                <div class="radar-dial" id="dial-i" onclick="rotateDial(event, 'i')">
                    <div class="dial-indicator"></div>
                    </div>
            </div>
            <div class="dial-wrapper">
                <div class="dial-title">韵母 (L/R Tap)</div>
                <div class="radar-dial" id="dial-f" onclick="rotateDial(event, 'f')">
                    <div class="dial-indicator"></div>
                </div>
            </div>
            <div class="dial-wrapper">
                <div class="dial-title">声调 (L/R Tap)</div>
                <div class="radar-dial" id="dial-t" onclick="rotateDial(event, 't')">
                    <div class="dial-indicator"></div>
                </div>
            </div>
        </div>
        <div class="fire-zone">
            <button id="btn-fire" onclick="fireLaser()" disabled>FIRE 🚀</button>
        </div>
    </div>

    <div id="overlay">
        <h1 style="color:#fff; font-size: 40px; margin-bottom:10px;">Space Pinyin</h1>
        <button onclick="startGame()" style="background:#10b981; color:white; border:none; padding:15px 40px; border-radius:30px; font-size:24px; font-weight:900;">PLAY NOW</button>
    </div>

<script>
    // --- 题库 ---
    const WORDS = [
        { char: '爸', i: 'b', f: 'a', t: '4', py: 'bà' },
        { char: '妈', i: 'm', f: 'a', t: '1', py: 'mā' },
        { char: '大', i: 'd', f: 'a', t: '4', py: 'dà' },
        { char: '水', i: 'sh', f: 'ui', t: '3', py: 'shuǐ' },
        { char: '的', i: 'd', f: 'e', t: '空', py: 'de' }
    ];

    const ALL_INITIALS = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
    const ALL_FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong'];
    const ALL_TONES = ['1', '2', '3', '4', '空'];

    let state = {
        score: 0, time: 60, isPlaying: false, currentTarget: null,
        // 转盘状态： angle 是整个盘的旋转角度，opts 是里面的5个选项
        i: { angle: 0, opts: [] },
        f: { angle: 0, opts: [] },
        t: { angle: 0, opts: [] },
        // 靶子的物理属性
        targetX: 120, // 百分比，从 120% (右侧外) 飞向 -20% (左侧外)
        targetSpeed: 0.15,
        targetActive: false // 是否可以射击
    };

    let gameLoopRef;
    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');
    const targetEntity = document.getElementById('target-entity');
    const uiChar = document.getElementById('target-char');

    // --- 游戏流程 ---
    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.time = 60; state.isPlaying = true;
        document.getElementById('ui-score').innerText = state.score; 
        document.getElementById('btn-fire').disabled = false;
        
        resizeCanvas();
        spawnTarget();
        gameLoop();

        let timer = setInterval(() => {
            if(!state.isPlaying) { clearInterval(timer); return; }
            state.time--; document.getElementById('ui-time').innerText = state.time;
            if(state.time <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        state.isPlaying = false;
        cancelAnimationFrame(gameLoopRef);
        document.getElementById('btn-fire').disabled = true;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay').innerHTML = `<h1 style="color:#fff;">Time's Up! Score: ${state.score}</h1><button onclick="location.reload()" style="background:#10b981; color:white; border:none; padding:15px 40px; border-radius:30px; font-size:24px; font-weight:900;">PLAY AGAIN</button>`;
    }

    function getDistractors(correct, allArr) {
        let filtered = allArr.filter(x => x !== correct);
        filtered.sort(() => 0.5 - Math.random());
        let res = filtered.slice(0, 4); res.push(correct);
        return res.sort(() => 0.5 - Math.random());
    }

    function spawnTarget() {
        // 随机选字
        let next = WORDS[Math.floor(Math.random() * WORDS.length)];
        state.currentTarget = next;
        
        // 重置靶子位置和状态
        state.targetX = 120; // 屏幕最右边往外一点
        state.targetActive = true;
        targetEntity.className = ''; 
        uiChar.innerText = next.char;

        // 生成 5 个备选项
        state.i.opts = getDistractors(next.i, ALL_INITIALS);
        state.f.opts = getDistractors(next.f, ALL_FINALS);
        state.t.opts = [...ALL_TONES];

        // 重置圆盘
        buildDial('i', state.i.opts);
        buildDial('f', state.f.opts);
        buildDial('t', state.t.opts);
        
        updateHUD();
    }

    // --- 游戏物理循环 ---
    function gameLoop() {
        if (!state.isPlaying) return;

        if (state.targetActive) {
            state.targetX -= state.targetSpeed;
            targetEntity.style.right = 'auto'; // 改用 left 控制，因为百分比更好算
            targetEntity.style.left = state.targetX + '%';

            // 如果飞出左边界还没打中 (Miss)
            if (state.targetX < -20) {
                state.targetActive = false;
                targetEntity.classList.add('target-miss');
                // 惩罚或提示音
                setTimeout(() => { if(state.isPlaying) spawnTarget(); }, 1000);
            }
        }
        
        gameLoopRef = requestAnimationFrame(gameLoop);
    }

    // --- 🛸 核心：永远正立的圆盘逻辑 ---
    // 每个圆盘有 5 个选项，间隔 360/5 = 72 度
    function buildDial(type, options) {
        const dial = document.getElementById(`dial-${type}`);
        // 保留指示器，清空旧数据
        dial.innerHTML = '<div class="dial-indicator"></div>'; 
        
        options.forEach((opt, index) => {
            let angle = index * 72; // 在圆盘上的物理位置
            let container = document.createElement('div');
            container.className = `dial-item-container item-${index}`;
            // 容器旋转，把位置定在圆的四周
            container.style.transform = `rotate(${angle}deg)`;
            
            let textDiv = document.createElement('div');
            textDiv.className = 'dial-text';
            textDiv.id = `text-${type}-${index}`;
            textDiv.innerText = opt;
            // 初始状态，所有文字为了保持水平，需要反向旋转
            textDiv.style.transform = `rotate(${-angle}deg)`;
            
            container.appendChild(textDiv);
            dial.appendChild(container);
        });

        state[type].angle = 0;
        updateDialVisuals(type);
    }

    // 点击圆盘两侧旋转 (类似于开车方向盘)
    function rotateDial(event, type) {
        let rect = event.currentTarget.getBoundingClientRect();
        let clickX = event.clientX - rect.left;
        let isLeft = clickX < rect.width / 2;
        
        let dir = isLeft ? -1 : 1; // 点击左边逆时针转(-1)，点击右边顺时针转(+1)
        state[type].angle += dir * 72;
        updateDialVisuals(type);
        updateHUD();
    }

    function updateDialVisuals(type) {
        const dial = document.getElementById(`dial-${type}`);
        // 整个盘子转动
        dial.style.transform = `rotate(${-state[type].angle}deg)`;

        // 计算当前哪个索引在正上方
        let steps = Math.round(state[type].angle / 72);
        let activeIdx = steps % 5;
        if (activeIdx < 0) activeIdx += 5;

        // 让所有文字反向转动，抵消盘子的转动，保持永远水平正立！
        for(let i=0; i<5; i++){
            let txt = document.getElementById(`text-${type}-${i}`);
            if(txt) {
                let itemBaseAngle = i * 72;
                // 反向抵消公式： -(自身基础角度 + 当前盘子转动的角度)
                let counterAngle = -(itemBaseAngle - state[type].angle);
                txt.style.transform = `rotate(${counterAngle}deg)`;
                
                if (i === activeIdx) txt.classList.add('active');
                else txt.classList.remove('active');
            }
        }
    }

    function getSelectedValue(type) {
        let steps = Math.round(state[type].angle / 72);
        let activeIdx = steps % 5;
        if (activeIdx < 0) activeIdx += 5;
        return state[type].opts[activeIdx];
    }

    // 更新飞船中心的 HUD 弹舱显示
    function updateHUD() {
        let sI = getSelectedValue('i');
        let sF = getSelectedValue('f');
        let sT = getSelectedValue('t') === '空' ? '' : getSelectedValue('t');
        document.getElementById('hud-bullet').innerText = `${sI}${sF}${sT}`;
    }

    // --- 射击判定 ---
    function fireLaser() {
        if (!state.isPlaying || !state.targetActive) return;
        drawLaser();

        let curI = getSelectedValue('i');
        let curF = getSelectedValue('f');
        let curT = getSelectedValue('t');

        if (curI === state.currentTarget.i && curF === state.currentTarget.f && curT === state.currentTarget.t) {
            // 打中！
            state.targetActive = false; // 靶子停止移动
            targetEntity.classList.add('target-hit');
            uiChar.innerText = state.currentTarget.py; // 显示正确拼音
            
            state.score += 10; document.getElementById('ui-score').innerText = state.score;
            
            let rect = targetEntity.getBoundingClientRect();
            confetti({ particleCount: 30, spread: 50, origin: { x: (rect.left+25)/window.innerWidth, y: (rect.top+25)/window.innerHeight }});
            
            setTimeout(() => { if(state.isPlaying) spawnTarget(); }, 800);
        } else {
            // 打错
            document.getElementById('hud-bullet').style.backgroundColor = 'red';
            setTimeout(() => { document.getElementById('hud-bullet').style.backgroundColor = 'rgba(15, 23, 42, 0.9)'; }, 200);
        }
    }

    function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.addEventListener('resize', resizeCanvas);

    function drawLaser() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let shipRect = document.getElementById('hud-bullet').getBoundingClientRect();
        let sX = shipRect.left + shipRect.width / 2;
        let sY = shipRect.top; // 从 HUD 顶部射出

        let targetRect = targetEntity.getBoundingClientRect();
        let tX = targetRect.left + targetRect.width / 2;
        let tY = targetRect.top + targetRect.height / 2;

        ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(tX, tY);
        ctx.lineWidth = 4; ctx.strokeStyle = '#38bdf8'; ctx.shadowBlur = 10; ctx.shadowColor = '#38bdf8'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(tX, tY);
        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.shadowBlur = 0; ctx.stroke();

        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 100);
    }
</script>
</body>
</html>
