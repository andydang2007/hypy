<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinyin Shooting: Database Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent-glow: #06b6d4;   
            --correct-color: #22c55e; 
            --wrong-color: #ef4444;   
            --panel-light-bg: rgba(248, 250, 252, 0.95);
            --wheel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted-light: #94a3b8;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; }

        body { 
            margin: 0; padding: 0; color: #fff; 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            background-color: #020617;
            background-image: radial-gradient(circle at 15% 50%, rgba(29, 78, 216, 0.15) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.15) 0%, transparent 50%);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(6, 182, 212, 0.3); z-index: 10;
        }

        .stat-box { display: flex; flex-direction: column; align-items: flex-end; min-width: 80px; }
        .stat-label { font-size: 10px; color: #94a3b8; font-weight: bold; }
        .stat-value { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--accent-glow); }
        #db-status { font-size: 12px; color: #22c55e; }

        #combat-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; }
        #laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #rule-toast {
            position: absolute; top: 15%; left: 0; width: 100%; text-align: center;
            color: #fbbf24; font-size: 18px; font-weight: 900; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 50;
        }

        /* 飞船 */
        #spaceship-container { position: absolute; left: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); z-index: 10; }
        .spaceship { position: relative; width: 160px; height: 100px; display: flex; justify-content: center; align-items: center; }
        .wing { position: absolute; width: 60px; height: 30px; background: rgba(30, 41, 59, 0.9); top: 35px; border-bottom: 3px solid var(--accent-glow); }
        .wing.left { left: 0; clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%); }
        .wing.right { right: 0; clip-path: polygon(0 0, 80% 0, 100% 100%, 0 100%); }
        .ship-core {
            width: 90px; height: 90px; background: #0f172a; border: 4px solid var(--accent-glow); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 12; cursor: pointer;
        }
        .hud-text { display: inline-block; transform: rotate(-90deg); font-size: 32px; font-weight: 900; }
        .ship-core.needs-fix { border-color: #ef4444; animation: pulseRed 1s infinite alternate; }

        @keyframes pulseRed { from { box-shadow: 0 0 10px #ef4444; } to { box-shadow: 0 0 30px #ef4444; } }

        /* 怪物 */
        #target-mover { position: absolute; top: 50%; right: -150px; transform: translateY(-50%); z-index: 8; }
        .enemy-target {
            width: 100px; height: 100px; border-radius: 20px; background: rgba(255,255,255,0.1); border: 2px solid #fff;
            transform: rotate(45deg); display: flex; justify-content: center; align-items: center;
        }
        .enemy-text { transform: rotate(-45deg); font-size: 44px; font-weight: 900; }

        /* 仪表盘 */
        .dashboard {
            height: 200px; background: var(--panel-light-bg); border-top: 4px solid #cbd5e1;
            display: flex; justify-content: space-evenly; align-items: center; border-radius: 30px 30px 0 0;
        }
        .dial-container { position: relative; width: 140px; height: 140px; }
        .dial-wrapper { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #e2e8f0; background: #fff; position: relative; display: flex; justify-content: center; align-items: center; cursor: grab; }
        .dial-wheel { width: 100%; height: 100%; border-radius: 50%; position: absolute; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dial-item { position: absolute; top: 50%; left: 50%; width: 40px; height: 30px; margin-top: -15px; margin-left: -20px; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; color: #94a3b8; }
        .dial-item.active { font-size: 32px; color: #0284c7; }
        .dial-arrow { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); font-size: 24px; color: #0284c7; }

        #btn-fire-action {
            width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(#ef4444, #b91c1c);
            border: 4px solid #fff; color: white; font-size: 24px; font-weight: 900; box-shadow: 0 8px 0 #7f1d1d; cursor: pointer;
        }
        #btn-fire-action:active { transform: translateY(5px); box-shadow: 0 3px 0 #7f1d1d; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn { padding: 15px 40px; border-radius: 30px; border: none; background: #06b6d4; color: #fff; font-size: 24px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div id="db-status">正在连接数据库...</div>
        <div class="stat-box"><span class="stat-label">SCORE</span><span class="stat-value" id="ui-score">0</span></div>
    </header>

    <div id="combat-area">
        <canvas id="laser-canvas"></canvas>
        <div id="rule-toast">⚠️ j q x y 遇到 ü 要脱帽！点击屏幕上的拼音脱帽！</div>

        <div id="spaceship-container">
            <div class="spaceship">
                <div class="wing left"></div>
                <div class="ship-core" onclick="handleHudClick()"><span class="hud-text" id="hud-display"></span></div>
                <div class="wing right"></div>
            </div>
        </div>

        <div id="target-mover">
            <div class="enemy-target" id="target-container" onclick="playTargetAudio()">
                <div class="enemy-text" id="target-char">🎯</div>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="dial-container"><div class="dial-wrapper" id="wrap-i"><div class="dial-wheel" id="wheel-i"></div></div><div class="dial-arrow">◀</div></div>
        <div class="dial-container"><div class="dial-wrapper" id="wrap-f"><div class="dial-wheel" id="wheel-f"></div></div><div class="dial-arrow">◀</div></div>
        <div class="dial-container"><div class="dial-wrapper" id="wrap-t"><div class="dial-wheel" id="wheel-t"></div></div><div class="dial-arrow">◀</div></div>
        <button id="btn-fire-action" onclick="handleFireClick()">FIRE</button>
    </div>

    <div id="overlay">
        <h1 id="loading-msg">PINYIN DEFENDER</h1>
        <button class="start-btn" id="btn-start" onclick="startGame()" style="display:none">MISSION START</button>
    </div>

<script>
    // --- 拼音解析引擎 (将 "bà" 解析为 {i:"b", f:"a", t:"4"}) ---
    const TONE_DATA = {
        'ā':'a1','á':'a2','ǎ':'a3','à':'a4','ē':'e1','é':'e2','ě':'e3','è':'e4','ō':'o1','ó':'o2','ǒ':'o3','ò':'o4',
        'ī':'i1','í':'i2','ǐ':'i3','ì':'i4','ū':'u1','ú':'u2','ǔ':'u3','ù':'u4','ǖ':'ü1','ǘ':'ü2','ǚ':'ü3','ǜ':'ü4'
    };
    const INITIALS = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];

    function parsePinyin(py) {
        if (py === 'de') return { i:'d', f:'e', t:'轻声' };
        let clean = py;
        let tone = '轻声';
        for (let char in TONE_DATA) {
            if (py.includes(char)) {
                tone = TONE_DATA[char].slice(-1);
                clean = py.replace(char, TONE_DATA[char][0]);
                break;
            }
        }
        let initial = '空';
        for (let i of INITIALS) {
            if (clean.startsWith(i)) {
                if (i.length === 2 && clean.startsWith(i)) { initial = i; break; }
                if (i.length === 1 && !['z','c','s'].includes(clean[0])) { initial = i; break; }
                initial = i;
            }
        }
        let final = initial === '空' ? clean : clean.slice(initial.length);
        // 特殊处理：如果是 j q x y 后面跟 u，实际上是 ü
        if (['j','q','x','y'].includes(initial) && final === 'u') final = 'ü';
        return { i: initial, f: final, t: tone };
    }

    // --- 数据库调取 ---
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=573238154&single=true&output=csv";
    let DB_WORDS = [];

    async function loadDatabase() {
        try {
            const resp = await fetch(CSV_URL);
            const text = await resp.text();
            const rows = text.split('\n').slice(1); // 跳过表头
            DB_WORDS = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 7) return null;
                const pyRaw = cols[6].trim().split(' / ')[0]; // 取第一个拼音答案
                const parsed = parsePinyin(pyRaw);
                return { char: cols[4].trim(), i: parsed.i, f: parsed.f, t: parsed.t, py: pyRaw };
            }).filter(w => w !== null);
            
            document.getElementById('db-status').innerText = `已加载 ${DB_WORDS.length} 个生字`;
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('loading-msg').innerText = "数据库就绪";
        } catch (e) {
            document.getElementById('db-status').innerText = "数据库加载失败，请检查网络";
            console.error(e);
        }
    }

    // --- 游戏核心逻辑 ---
    let state = {
        score: 0, isPlaying: false, currentTarget: null, hatRemoved: false, 
        i: { angle: 0, opts: [] }, f: { angle: 0, opts: [] }, t: { angle: 0, opts: [] },
        targetX: -20, targetSpeed: 0.12, targetActive: false 
    };

    const ALL_INITIALS = ['空','b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
    const ALL_FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong','iao','ia','ian','iang','ua','uo','uan','uang','uai'];
    const ALL_TONES = ['1', '2', '3', '4', '轻声'];

    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.isPlaying = true;
        nextTarget();
        gameLoop();
    }

    function gameLoop() {
        if (!state.isPlaying) return;
        if (state.targetActive) {
            state.targetX += state.targetSpeed;
            document.getElementById('target-mover').style.right = state.targetX + 'vw';
            if (state.targetX > 105) {
                state.targetActive = false;
                playSound('wrong');
                setTimeout(nextTarget, 1000);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function nextTarget() {
        if (!DB_WORDS.length) return;
        let next = DB_WORDS[Math.floor(Math.random() * DB_WORDS.length)];
        state.currentTarget = next;
        state.targetX = -20;
        state.targetActive = true;
        state.hatRemoved = false;
        
        document.getElementById('target-char').innerText = next.char;
        buildDial('i', getDistractors(next.i, ALL_INITIALS));
        buildDial('f', getDistractors(next.f, ALL_FINALS));
        buildDial('t', ALL_TONES);
        updateHUD();
    }

    function getDistractors(correct, all) {
        let res = all.filter(x => x !== correct).sort(() => 0.5-Math.random()).slice(0, 6);
        res.push(correct);
        return res.sort(() => 0.5-Math.random());
    }

    function buildDial(type, opts) {
        state[type].opts = opts;
        state[type].step = 360 / opts.length;
        const wheel = document.getElementById(`wheel-${type}`);
        wheel.innerHTML = opts.map((o, idx) => `<div class="dial-item" id="item-${type}-${idx}" style="transform: rotate(${idx*state[type].step}deg) translateX(55px)">${o}</div>`).join('');
        state[type].angle = 0;
        setupiPod(type);
        updateVisuals(type);
    }

    function setupiPod(type) {
        const wrap = document.getElementById(`wrap-${type}`);
        let isDragging = false, startA = 0, initR = 0;
        const getA = (e) => {
            const r = wrap.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - (r.left + r.width/2);
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - (r.top + r.height/2);
            return Math.atan2(y, x) * 180 / Math.PI;
        };
        wrap.onmousedown = wrap.ontouchstart = (e) => { isDragging = true; startA = getA(e); initR = state[type].angle; };
        window.onmousemove = window.ontouchmove = (e) => {
            if (!isDragging) return;
            let delta = getA(e) - startA;
            state[type].angle = Math.round((initR + delta) / state[type].step) * state[type].step;
            updateVisuals(type);
        };
        window.onmouseup = window.ontouchend = () => { isDragging = false; playSound('spin'); };
    }

    function updateVisuals(type) {
        const wheel = document.getElementById(`wheel-${type}`);
        wheel.style.transform = `rotate(${state[type].angle}deg)`;
        let idx = (Math.round(-state[type].angle / state[type].step) % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        Array.from(wheel.children).forEach((el, i) => el.classList.toggle('active', i === idx));
        updateHUD();
    }

    function getVal(type) {
        let idx = (Math.round(-state[type].angle / state[type].step) % state[type].opts.length + state[type].opts.length) % state[type].opts.length;
        return state[type].opts[idx];
    }

    function updateHUD() {
        let i = getVal('i'), f = getVal('f'), t = getVal('t');
        let needsFix = ['j','q','x','y'].includes(i) && f === 'ü';
        let displayF = (needsFix && state.hatRemoved) ? 'u' : f;
        document.querySelector('.ship-core').classList.toggle('needs-fix', needsFix && !state.hatRemoved);
        document.getElementById('hud-display').innerText = (i==='空'?'':i) + displayF + (t==='轻声'?'':t);
    }

    function handleHudClick() {
        if (!state.isPlaying) return;
        if (document.querySelector('.ship-core').classList.contains('needs-fix')) {
            state.hatRemoved = true; playSound('pop'); updateHUD();
            confetti({ particleCount: 20, origin: { x: 0.1, y: 0.5 } });
        }
    }

    function handleFireClick() {
        if (!state.isPlaying || !state.targetActive) return;
        if (document.querySelector('.ship-core').classList.contains('needs-fix')) {
            playSound('wrong');
            document.getElementById('rule-toast').style.opacity = 1;
            setTimeout(() => document.getElementById('rule-toast').style.opacity = 0, 2000);
            return;
        }
        drawLaser();
        if (getVal('i') === state.currentTarget.i && getVal('f') === state.currentTarget.f && getVal('t') === state.currentTarget.t) {
            state.targetActive = false;
            state.score += 10; document.getElementById('ui-score').innerText = state.score;
            playSound('laser');
            confetti({ particleCount: 50, origin: { x: 0.8, y: 0.5 } });
            setTimeout(nextTarget, 1000);
        } else {
            playSound('wrong');
        }
    }

    function drawLaser() {
        resizeCanvas();
        const ship = document.querySelector('.ship-core').getBoundingClientRect();
        const enemy = document.getElementById('target-container').getBoundingClientRect();
        ctx.beginPath(); ctx.moveTo(ship.left+ship.width, ship.top+ship.height/2);
        ctx.lineTo(enemy.left+enemy.width/2, enemy.top+enemy.height/2);
        ctx.lineWidth = 10; ctx.strokeStyle = "#06b6d4"; ctx.stroke();
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 100);
    }

    function playSound(type) {
        let actx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = actx.createOscillator(); let g = actx.createGain();
        osc.connect(g); g.connect(actx.destination);
        if(type==='laser'){ osc.type='sawtooth'; osc.frequency.setValueAtTime(800,0); osc.frequency.linearRampToValueAtTime(100,0.2); }
        else if(type==='wrong'){ osc.type='square'; osc.frequency.setValueAtTime(100,0); }
        else { osc.type='sine'; osc.frequency.setValueAtTime(400,0); }
        osc.start(); osc.stop(0.2);
    }

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    loadDatabase();
</script>
</body>
</html>
