<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinyin Shooter: Laser Expedition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent-glow: #00f0ff; 
            --correct-color: #39ff14; 
            --wrong-color: #ff003c;   
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; color: #fff; 
            font-family: 'Microsoft YaHei', sans-serif;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%), 
                radial-gradient(circle at 85% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        .sci-fi-text { font-family: 'Orbitron', sans-serif; }

        header {
            display: flex; justify-content: flex-end; align-items: center;
            padding: 10px 20px; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(5px);
            border-bottom: 2px solid rgba(0, 240, 255, 0.2); z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stat-box { display: flex; flex-direction: column; align-items: flex-end; min-width: 80px; }
        .stat-label { font-size: 12px; color: var(--accent-glow); font-weight: bold; letter-spacing: 2px; }
        .stat-value { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }

        #combat-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; }
        #laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 🚀 飞船容器：已默认顺时针旋转90度 */
        #spaceship-container { 
            position: absolute; left: 20px; top: 50%; 
            transform: translateY(-50%) rotate(90deg); 
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }
        
        /* JPG 飞船图片 (使用滤色混合模式消除黑底) */
        #player-ship-img {
            width: 100px; height: auto; 
            mix-blend-mode: screen; 
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }
        
        /* 精准炮口锚点 (位于图片的正上方，即旋转后的正右方) */
        #laser-muzzle {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
            z-index: 20;
        }

        /* 飞船中心的全息拼音显示环 */
        .ship-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 48px; height: 48px; background: rgba(5,5,5,0.7); 
            border: 2px solid var(--accent-glow); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 12; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 0 10px rgba(0, 240, 255, 0.4); 
            backdrop-filter: blur(2px);
        }
        
        .hud-text { display: inline-block; transform: rotate(-90deg); font-size: 20px; font-weight: 900; color: #fff; font-family: sans-serif;}
        .ship-core.needs-fix { border-color: var(--wrong-color); box-shadow: 0 0 30px var(--wrong-color), inset 0 0 15px var(--wrong-color); animation: pulseRed 0.8s infinite alternate; }
        @keyframes pulseRed { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }

        #finger-hint {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%) rotate(-90deg);
            font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
            animation: pointDown 0.6s infinite alternate cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: none; z-index: 20; pointer-events: none;
        }
        @keyframes pointDown { from { top: -60px; } to { top: -40px; } }

        #target-mover { position: absolute; top: 50%; right: -100px; transform: translateY(-50%); z-index: 8; }
        .enemy-target {
            width: 45px; height: 45px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.5);
            transform: rotate(45deg); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.1); backdrop-filter: blur(4px);
        }
        .enemy-text { transform: rotate(-45deg); font-size: 24px; font-weight: 900; color: #fff; }

        .dashboard {
            height: 25vh; min-height: 180px; 
            background: linear-gradient(to bottom, #1e293b, #0f172a); 
            border-top: 4px solid #334155;
            display: flex; justify-content: center; align-items: flex-end; gap: 3vw; border-radius: 30px 30px 0 0;
            box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 -15px 40px rgba(0,0,0,0.8);
            padding: 0 2vw 15px 2vw;
        }

        .gauge-unit {
            position: relative; flex: 1; max-width: 220px; height: 140px;
            background: rgba(0, 0, 0, 0.5); border: 2px solid #334155; border-radius: 20px 20px 40px 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 5px 10px rgba(0,0,0,0.5);
            overflow: hidden; cursor: grab;
        }
        .gauge-unit:active { cursor: grabbing; }

        #box-i, #box-f { flex: 1.2; max-width: 240px; }
        #box-t { flex: 0.8; max-width: 160px; }

        .gauge-glass {
            position: absolute; top: 10px; left: 10px; right: 10px; height: 90px;
            background: radial-gradient(ellipse at bottom center, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            border-top: 2px solid rgba(0, 240, 255, 0.2); border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            pointer-events: none; z-index: 1;
        }

        .gauge-origin {
            position: absolute; bottom: 0px; left: 50%;
            width: 0; height: 0; z-index: 2;
        }

        .gauge-item {
            position: absolute; display: flex; justify-content: center; align-items: center; 
            font-size: 16px; font-weight: bold; color: #64748b; white-space: nowrap;
            text-shadow: 1px 1px 2px #000; transition: 0.2s;
        }
        .gauge-item.active { font-size: 26px; font-weight: 900; color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.8); filter: drop-shadow(0 2px 2px #000); }

        .gauge-tick {
            position: absolute; top: -5px; left: -2px; width: 4px; height: 10px; background: #475569;
            border-radius: 2px; transition: 0.2s;
        }
        .gauge-tick.active { background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }

        .gauge-pointer-wrapper { position: absolute; top: 0; left: 0; width: 0; height: 0; z-index: 10; pointer-events: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gauge-pointer {
            position: absolute; bottom: 0; left: -2px; width: 4px; height: 70px; 
            background: linear-gradient(to top, transparent 15%, #ff003c 70%, #ff003c 100%);
            transform-origin: bottom center; filter: drop-shadow(0 0 6px #ff003c);
        }
        .gauge-pointer::after {
            content: ''; position: absolute; top: -3px; left: -3px; width: 10px; height: 10px;
            background: #ff003c; border-radius: 50%; box-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c;
        }

        .gauge-knob {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #e2e8f0, #64748b);
            border: 2px solid #0f172a; box-shadow: 0 -3px 10px rgba(0,0,0,0.8), inset 0 -3px 5px rgba(0,0,0,0.3);
            z-index: 15; pointer-events: none;
        }
        .gauge-knob::after { content: ''; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); box-shadow: inset 0 2px 4px rgba(255,255,255,0.4); }

        .action-container { display: flex; justify-content: center; align-items: center; margin-bottom: 10px;}
        #btn-fire-action {
            width: 20vw; max-width: 110px; aspect-ratio: 1; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b91c1c);
            border: 6px solid #450a0a; color: white; font-size: 22px; font-weight: 900; 
            cursor: pointer; transition: 0.1s; letter-spacing: 2px;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 10px 0 #7f1d1d, 0 15px 25px rgba(0,0,0,0.8); text-shadow: -1px -1px 0 rgba(0,0,0,0.4);
        }
        #btn-fire-action:active { transform: translateY(8px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 2px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.8); background: radial-gradient(circle at 30% 30%, #cc0000, #7f1d1d); }

        /* --- UI 界面 --- */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .game-title { display: flex; flex-direction: column; align-items: center; gap: 15px; font-size: 36px; color: #fff; margin-bottom: 30px; text-shadow: 0 0 20px var(--accent-glow); text-align: center; letter-spacing: 4px; }
        .title-line { display: flex; gap: 20px; }
        .psle-cap { color: #fbbf24; font-size: 64px; text-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
        #loading-ui { color: var(--accent-glow); font-size: 20px; letter-spacing: 3px; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
        
        /* 选船区 */
        .ship-selector-title { font-size: 16px; letter-spacing: 2px; margin-bottom: 15px; color: #94a3b8; display: none; }
        .ship-selector { display: none; gap: 15px; margin-bottom: 40px; }
        .ship-option {
            width: 70px; height: 70px; border-radius: 10px; border: 2px solid #334155;
            object-fit: cover; cursor: pointer; transition: 0.2s; mix-blend-mode: screen;
            background: #000;
        }
        .ship-option.selected { border-color: var(--accent-glow); box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.15); }

        .start-btn { 
            padding: 18px 50px; border: 2px solid var(--accent-glow); background: rgba(0, 240, 255, 0.05); color: var(--accent-glow); 
            font-size: 26px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.2);
            letter-spacing: 3px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: all 0.2s; display: none;
        }
        .start-btn:active { transform: scale(0.95); }

        @media (max-width: 800px) {
            .game-title { font-size: 5vw; gap: 10px; } .psle-cap { font-size: 9vw; }
            .dashboard { gap: 2vw; padding: 0 10px 10px 10px; height: 22vh; min-height: 140px;}
            .gauge-unit { height: 110px; }
            .gauge-pointer { height: 55px; } 
            #btn-fire-action { font-size: 16px; border-width: 4px; box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 6px 0 #7f1d1d, 0 10px 15px rgba(0,0,0,0.6);}
            #btn-fire-action:active { transform: translateY(5px); box-shadow: inset 0 5px 10px rgba(255,255,255,0.4), 0 1px 0 #7f1d1d, 0 5px 10px rgba(0,0,0,0.6);}
        }
    </style>
</head>
<body>

    <header>
        <div class="stat-box"><span class="stat-label sci-fi-text">SCORE</span><span class="stat-value sci-fi-text" id="ui-score">0</span></div>
    </header>

    <div id="combat-area">
        <canvas id="laser-canvas"></canvas>

        <div id="spaceship-container">
            <img id="player-ship-img" src="" alt="Fighter">
            <div id="laser-muzzle"></div>
            <div class="ship-core" id="ship-main" onclick="handleHudClick()">
                <div id="finger-hint">👇</div>
                <span class="hud-text" id="hud-display"></span>
            </div>
        </div>

        <div id="target-mover">
            <div class="enemy-target" id="target-container">
                <div class="enemy-text" id="target-char">🎯</div>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="gauge-unit" id="box-i">
            <div class="gauge-glass"></div>
            <div class="gauge-origin" id="origin-i"></div>
            <div class="gauge-knob"></div>
        </div>
        
        <div class="gauge-unit" id="box-f">
            <div class="gauge-glass"></div>
            <div class="gauge-origin" id="origin-f"></div>
            <div class="gauge-knob"></div>
        </div>

        <div class="gauge-unit" id="box-t">
            <div class="gauge-glass"></div>
            <div class="gauge-origin" id="origin-t"></div>
            <div class="gauge-knob"></div>
        </div>

        <div class="action-container"><button id="btn-fire-action" class="sci-fi-text" onclick="handleFireClick()">FIRE</button></div>
    </div>

    <div id="overlay">
        <h1 class="game-title sci-fi-text">
            <div class="title-line"><span><span class="psle-cap">P</span>INYIN</span><span><span class="psle-cap">S</span>HOOTER</span></div>
            <div class="title-line"><span><span class="psle-cap">L</span>ASER</span><span><span class="psle-cap">E</span>XPEDITION</span></div>
        </h1>
        
        <div id="loading-ui" class="sci-fi-text">ACCESSING DATABASE...</div>
        
        <div class="ship-selector-title sci-fi-text" id="selector-title">SELECT YOUR FIGHTER</div>
        <div class="ship-selector" id="ship-selector">
            <img class="ship-option selected" src="https://i.postimg.cc/Hj4jCRLw/Screenshot-2026-04-16-16-28-23-059-com-miui-gallery-edit.jpg" onclick="selectShip(0)">
            <img class="ship-option" src="https://i.postimg.cc/kDFDdz5b/Screenshot-2026-04-16-16-28-40-480-com-miui-gallery-edit.jpg" onclick="selectShip(1)">
            <img class="ship-option" src="https://i.postimg.cc/vDdDkbG6/Screenshot-2026-04-16-16-28-53-842-com-miui-gallery-edit.jpg" onclick="selectShip(2)">
            <img class="ship-option" src="https://i.postimg.cc/jnhpkzt1/Screenshot-2026-04-16-16-29-09-336-com-miui-gallery-edit.jpg" onclick="selectShip(3)">
        </div>

        <button class="start-btn sci-fi-text" id="btn-start" onclick="startGame()">MISSION START</button>
    </div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=573238154&single=true&output=csv";
    
    const SHIPS = [
        'https://i.postimg.cc/Hj4jCRLw/Screenshot-2026-04-16-16-28-23-059-com-miui-gallery-edit.jpg',
        'https://i.postimg.cc/kDFDdz5b/Screenshot-2026-04-16-16-28-40-480-com-miui-gallery-edit.jpg',
        'https://i.postimg.cc/vDdDkbG6/Screenshot-2026-04-16-16-28-53-842-com-miui-gallery-edit.jpg',
        'https://i.postimg.cc/jnhpkzt1/Screenshot-2026-04-16-16-29-09-336-com-miui-gallery-edit.jpg'
    ];
    let currentShipIdx = 0;

    function selectShip(idx) {
        currentShipIdx = idx;
        const options = document.querySelectorAll('.ship-option');
        options.forEach((opt, i) => {
            if(i === idx) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });
    }

    const TONE_MAP = {'a':['','ā','á','ǎ','à'], 'o':['','ō','ó','ǒ','ò'], 'e':['','ē','é','ě','è'], 'i':['','ī','í','ǐ','ì'], 'u':['','ū','ú','ǔ','ù'], 'ü':['','ǖ','ǘ','ǚ','ǜ']};
    const TONE_DATA_REV = {'ā':'a1','á':'a2','ǎ':'a3','à':'a4','ē':'e1','é':'e2','ě':'e3','è':'e4','ō':'o1','ó':'o2','ǒ':'o3','ò':'o4','ī':'i1','í':'i2','ǐ':'i3','ì':'i4','ū':'u1','ú':'u2','ǔ':'u3','ù':'u4','ǖ':'ü1','ǘ':'ü2','ǚ':'ü3','ǜ':'ü4'};
    const INITIALS_LIST = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];

    let DB_WORDS = [];
    let state = {
        score: 0, isPlaying: false, currentTarget: null, hatRemoved: false, 
        i: { angle: 0, opts: [], step: 0 }, f: { angle: 0, opts: [], step: 0 }, t: { angle: 0, opts: [], step: 0 },
        targetX: -20, targetSpeed: 0.05, targetActive: false 
    };

    let actx = null;

    const ALL_INITIALS = ['','b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'];
    const ALL_FINALS = ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong','iao','ia','ian','iang','ua','uo','uan','uang','uai'];
    const ALL_TONES = ['1', '2', '', '3', '4']; 

    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');

    function parsePinyin(py) {
        if (py === 'de') return { i:'d', f:'e', t:'' };
        let clean = py, tone = ''; 
        for (let char in TONE_DATA_REV) { 
            if (py.includes(char)) { tone = TONE_DATA_REV[char].slice(-1); clean = py.replace(char, TONE_DATA_REV[char][0]); break; } 
        }
        let initial = ''; 
        for (let i of INITIALS_LIST) {
            if (clean.startsWith(i)) {
                if (i.length === 2) { initial = i; break; }
                if (i.length === 1) { initial = i; }
            }
        }
        let final = initial === '' ? clean : clean.slice(initial.length);
        if (['j','q','x','y'].includes(initial) && final === 'u') final = 'ü';
        return { i: initial, f: final, t: tone };
    }

    async function loadDB() {
        try {
            const resp = await fetch(CSV_URL);
            const text = await resp.text();
            DB_WORDS = text.split('\n').slice(1).map(row => {
                const cols = row.split(',');
                if (cols.length < 7) return null;
                const py = cols[6].trim().split(' / ')[0];
                return { char: cols[4].trim(), ...parsePinyin(py), py: py };
            }).filter(w => w);
            
            if(DB_WORDS.length > 0){
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('selector-title').style.display = 'block';
                document.getElementById('ship-selector').style.display = 'flex';
                document.getElementById('btn-start').style.display = 'block';
            }
        } catch (e) { document.getElementById('loading-ui').innerText = "NETWORK ERROR"; }
    }

    function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
    }

    function startGame() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        initAudio(); 
        
        // 渲染选中的飞机
        document.getElementById('player-ship-img').src = SHIPS[currentShipIdx];

        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.isPlaying = true;
        document.getElementById('ui-score').innerText = '0';
        nextTarget();
        gameLoop();
    }

    function getFixedOpts(correct, allArr) {
        let res = allArr.filter(x => x !== correct).sort(() => 0.5-Math.random()).slice(0, 4);
        res.push(correct);
        return res.sort(() => 0.5-Math.random());
    }

    function nextTarget() {
        if (!DB_WORDS.length) return;
        state.currentTarget = DB_WORDS[Math.floor(Math.random() * DB_WORDS.length)];
        state.targetX = -10;
        state.targetActive = true;
        state.hatRemoved = false;
        
        state.targetSpeed = 0.04 + Math.random() * 0.03; 
        document.getElementById('target-char').innerText = state.currentTarget.char;
        
        buildGauge('i', getFixedOpts(state.currentTarget.i, ALL_INITIALS));
        buildGauge('f', getFixedOpts(state.currentTarget.f, ALL_FINALS));
        buildGauge('t', ALL_TONES); 
    }

    function buildGauge(type, opts) {
        state[type].opts = opts;
        const N = 5; 
        const minAngle = -35;
        const maxAngle = 35;
        state[type].step = (maxAngle - minAngle) / (N - 1);
        
        const origin = document.getElementById(`origin-${type}`);
        const boxH = document.getElementById(`box-${type}`).offsetHeight;
        const R_TEXT = boxH * 0.85; 
        const R_TICK = R_TEXT - 22; 

        let ptrHTML = `
            <div class="gauge-pointer-wrapper" id="ptr-${type}">
                <div class="gauge-pointer"></div>
            </div>`;
            
        let html = '';
        opts.forEach((o, idx) => {
            let A = minAngle + idx * state[type].step;
            html += `
            <div style="position:absolute; top:0; left:0; width:0; height:0; transform: rotate(${A}deg) translateY(${-R_TICK}px);">
                <div class="gauge-tick" id="tick-${type}-${idx}"></div>
            </div>`;
            html += `
            <div style="position:absolute; top:0; left:0; width:0; height:0; transform: rotate(${A}deg) translateY(${-R_TEXT}px);">
                <div class="gauge-item" id="item-${type}-${idx}" style="transform: translate(-50%, -50%) rotate(${-A}deg);">${o}</div>
            </div>`;
        });
        
        origin.innerHTML = ptrHTML + html;
        state[type].angle = 0; 
        const ptr = document.getElementById(`ptr-${type}`);
        ptr.style.transition = 'none';
        ptr.style.transform = `rotate(${state[type].angle}deg)`;
        
        updateGaugeVisuals(type);
        setupGaugeInteraction(type);
    }

    function setupGaugeInteraction(type) {
        const box = document.getElementById(`box-${type}`);
        let isDragging = false, startX = 0, startAngle = 0, lastIdx = -1;

        const onStart = (e) => { 
            initAudio(); 
            isDragging = true; 
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startAngle = state[type].angle;
            document.getElementById(`ptr-${type}`).style.transition = 'none';
        };
        
        const onMove = (e) => {
            if (!isDragging) return; e.preventDefault();
            let currX = e.touches ? e.touches[0].clientX : e.clientX;
            let deltaX = currX - startX;
            
            let targetAngle = startAngle + deltaX * 0.8; 
            if (targetAngle < -35) targetAngle = -35;
            if (targetAngle > 35) targetAngle = 35;
            
            state[type].angle = targetAngle;
            document.getElementById(`ptr-${type}`).style.transform = `rotate(${state[type].angle}deg)`;
            
            let activeIdx = Math.round((state[type].angle - (-35)) / state[type].step);
            if (activeIdx !== lastIdx) {
                if (lastIdx !== -1) playSound('mech'); 
                lastIdx = activeIdx;
                updateGaugeClassesOnly(type, activeIdx);
                updateHUD();
            }
        };
        
        const onEnd = () => { 
            if(!isDragging) return; isDragging = false; 
            let activeIdx = Math.round((state[type].angle - (-35)) / state[type].step);
            state[type].angle = -35 + activeIdx * state[type].step;
            
            const ptr = document.getElementById(`ptr-${type}`);
            ptr.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            ptr.style.transform = `rotate(${state[type].angle}deg)`;
            
            updateGaugeClassesOnly(type, activeIdx);
            updateHUD();
        };

        box.onmousedown = box.ontouchstart = onStart;
        window.addEventListener('mousemove', onMove, {passive:false});
        window.addEventListener('touchmove', onMove, {passive:false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function updateGaugeClassesOnly(type, activeIdx) {
        const origin = document.getElementById(`origin-${type}`);
        Array.from(origin.querySelectorAll('.gauge-item')).forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        Array.from(origin.querySelectorAll('.gauge-tick')).forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    }

    function updateGaugeVisuals(type) {
        const ptr = document.getElementById(`ptr-${type}`);
        ptr.style.transform = `rotate(${state[type].angle}deg)`;
        let activeIdx = Math.round((state[type].angle - (-35)) / state[type].step);
        updateGaugeClassesOnly(type, activeIdx);
        updateHUD();
    }

    function getVal(type) {
        let activeIdx = Math.round((state[type].angle - (-35)) / state[type].step);
        if (activeIdx < 0) activeIdx = 0;
        if (activeIdx >= state[type].opts.length) activeIdx = state[type].opts.length - 1;
        return state[type].opts[activeIdx];
    }

    function combineTruePinyin(i, f, tStr) {
        let initial = i;
        let toneNum = parseInt(tStr);
        if (isNaN(toneNum)) return initial + f; 
        
        let v = '';
        if (f.includes('a')) v = 'a'; else if (f.includes('e')) v = 'e'; else if (f.includes('o')) v = 'o';
        else if (f.includes('ui')) v = 'i'; else if (f.includes('iu')) v = 'u'; else if (f.includes('i')) v = 'i';
        else if (f.includes('u')) v = 'u'; else if (f.includes('ü')) v = 'ü';
        
        let final = f;
        if (v) final = f.replace(v, TONE_MAP[v][toneNum]);
        return initial + final;
    }

    function updateHUD() {
        let i = getVal('i'), f = getVal('f'), t = getVal('t');
        let needsFix = ['j','q','x','y'].includes(i) && f.includes('ü');
        
        let displayF = f;
        if (needsFix) {
            if (!state.hatRemoved) {
                document.getElementById('ship-main').classList.add('needs-fix');
                document.getElementById('finger-hint').style.display = 'block';
            } else {
                displayF = f.replace(/ü/g, 'u');
                document.getElementById('ship-main').classList.remove('needs-fix');
                document.getElementById('finger-hint').style.display = 'none';
            }
        } else {
            document.getElementById('ship-main').classList.remove('needs-fix');
            document.getElementById('finger-hint').style.display = 'none';
        }

        document.getElementById('hud-display').innerText = combineTruePinyin(i, displayF, t);
    }

    function handleHudClick() {
        if (document.getElementById('ship-main').classList.contains('needs-fix')) {
            state.hatRemoved = true; updateHUD();
            confetti({ particleCount: 20, origin: { x: 0.1, y: 0.5 }, colors:['#fff','#00f0ff'], startVelocity: 15, ticks: 50 });
        }
    }

    function handleFireClick() {
        if (!state.isPlaying || !state.targetActive) return;
        
        if (document.getElementById('ship-main').classList.contains('needs-fix')) {
            playSound('wrong');
            document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1.5)';
            setTimeout(() => document.getElementById('finger-hint').style.transform = 'translateX(-50%) rotate(-90deg) scale(1)', 200);
            return;
        }

        drawLaser();
        if (getVal('i') === state.currentTarget.i && getVal('f') === state.currentTarget.f && getVal('t') === state.currentTarget.t) {
            state.targetActive = false;
            state.score += 10; document.getElementById('ui-score').innerText = state.score;
            
            const targetRect = document.getElementById('target-container').getBoundingClientRect();
            const cx = (targetRect.left + targetRect.width / 2) / window.innerWidth;
            const cy = (targetRect.top + targetRect.height / 2) / window.innerHeight;
            
            confetti({ 
                particleCount: 120, spread: 360, startVelocity: 35, gravity: 0.8, 
                origin: { x: cx, y: cy }, 
                colors:['#ff0000', '#ff5a00', '#ff9a00', '#ffce00', '#ffffff'],
                shapes: ['circle', 'square'], scalar: 1.2, ticks: 60
            });
            setTimeout(nextTarget, 1000);
        } else {
            playSound('wrong');
        }
    }

    function gameLoop() {
        if (!state.isPlaying) return;
        if (state.targetActive) {
            state.targetX += state.targetSpeed;
            document.getElementById('target-mover').style.right = state.targetX + 'vw';
            if (state.targetX > 105) { state.targetActive = false; playSound('wrong'); setTimeout(nextTarget, 1000); }
        }
        requestAnimationFrame(gameLoop);
    }

    function drawLaser() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        
        const muzzle = document.getElementById('laser-muzzle').getBoundingClientRect();
        const sX = muzzle.left + muzzle.width / 2; 
        const sY = muzzle.top + muzzle.height / 2;

        const enemy = document.getElementById('target-container').getBoundingClientRect();
        const tX = enemy.left + enemy.width / 2;
        const tY = enemy.top + enemy.height / 2;

        ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(tX, tY);
        ctx.lineWidth = 6; ctx.strokeStyle = "#00f0ff"; ctx.stroke();
        ctx.shadowBlur = 20; ctx.shadowColor = "#00f0ff"; ctx.stroke();
        playSound('laser');
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 100);
    }

    function playSound(type) {
        if (!actx) return;
        let osc = actx.createOscillator(); let g = actx.createGain();
        osc.connect(g); g.connect(actx.destination);
        if(type === 'mech'){ 
            osc.type = 'square'; osc.frequency.setValueAtTime(150, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.03);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.03);
            osc.start(); osc.stop(actx.currentTime + 0.03);
        }
        else if(type === 'laser'){ 
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, actx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.2);
            g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.2);
            osc.start(); osc.stop(actx.currentTime + 0.2);
        }
        else if(type === 'wrong'){ 
            osc.type = 'square'; osc.frequency.setValueAtTime(120, actx.currentTime); 
            g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
            osc.start(); osc.stop(actx.currentTime + 0.3);
        }
    }

    loadDB();
</script>
</body>
</html>
